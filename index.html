<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Interno - Lojas Alvorada</title>
  <link rel="icon" href="https://lojasalvorada.b-cdn.net/favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Bibliotecas de ícones corrigidas -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/lucide-react@latest"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #E30613; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    
    /* Prevenir seleção de texto em elementos de UI */
    .no-select { user-select: none; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 transition-colors">
  <div id="root"></div>

  <script type="text/babel">
    /**
     * Encapsulamos em um escopo fechado para evitar erros de re-declaração 
     * em ambientes de desenvolvimento (como o erro de 'Infinity').
     */
    (function() {
      const { useState, useEffect, useMemo } = React;
      
      /**
       * Correção do ReferenceError: 'lucide is not defined'
       * Em ambientes CDN, o Lucide React geralmente expõe via 'LucideReact'
       */
      const Icons = typeof LucideReact !== 'undefined' ? LucideReact : (typeof lucide !== 'undefined' ? lucide : {});
      const { 
        Search, Upload, FileText, LogOut, Moon, Sun, Folder, 
        ChevronRight, Download, Image, Film, Lock, CheckCircle, AlertCircle 
      } = Icons;

      const API_BASE = 'https://bunny-proxy.onrender.com/api'; 
      const PUBLIC_CDN = 'https://lojasalvorada.b-cdn.net';

      function App() {
        const [user, setUser] = useState(null);
        const [tab, setTab] = useState('search');
        const [darkMode, setDarkMode] = useState(true);
        const [captcha, setCaptcha] = useState({ q: '', a: 0 });
        const [credentials, setCredentials] = useState({ user: '', pass: '', captcha: '' });
        const [error, setError] = useState('');
        const [loading, setLoading] = useState(false);

        useEffect(() => {
          const session = localStorage.getItem('alvorada_session');
          if (session) {
            try {
              setUser(JSON.parse(session));
            } catch(e) {
              localStorage.removeItem('alvorada_session');
            }
          }
          generateCaptcha();
          if (darkMode) document.documentElement.classList.add('dark');
        }, []);

        const generateCaptcha = () => {
          const n1 = Math.floor(Math.random() * 9) + 1;
          const n2 = Math.floor(Math.random() * 9) + 1;
          setCaptcha({ q: `${n1} + ${n2}`, a: n1 + n2 });
        };

        const handleLogin = async (e) => {
          e.preventDefault();
          if (parseInt(credentials.captcha) !== captcha.a) {
            setError('Soma do Captcha incorreta.');
            generateCaptcha();
            return;
          }

          setLoading(true);
          setError('');
          try {
            const res = await fetch(`${API_BASE}/login`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: credentials.user, password: credentials.pass })
            });
            const data = await res.json();
            if (res.ok) {
              setUser(data);
              localStorage.setItem('alvorada_session', JSON.stringify(data));
            } else {
              setError(data.error || 'Falha no login');
              generateCaptcha();
            }
          } catch (err) {
            setError('Erro ao conectar ao servidor de autenticação.');
          } finally {
            setLoading(false);
          }
        };

        const logout = () => {
          setUser(null);
          localStorage.removeItem('alvorada_session');
        };

        if (!user) {
          return (
            <div className="min-h-screen flex items-center justify-center p-4">
              <div className="w-full max-w-md bg-white dark:bg-gray-900 p-8 rounded-3xl shadow-2xl border dark:border-gray-800 animate-in fade-in duration-500">
                <div className="text-center mb-8">
                  <img src="https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/MARCA%20COLORIDA.png" className="h-14 mx-auto mb-4" alt="Alvorada Logo" />
                  <h2 className="text-2xl font-extrabold dark:text-white">Acesso Restrito</h2>
                  <p className="text-gray-400 text-xs uppercase tracking-widest font-bold mt-1">Colaboradores Alvorada</p>
                </div>
                <form onSubmit={handleLogin} className="space-y-4">
                  <input type="text" placeholder="Utilizador" className="w-full p-4 rounded-2xl border dark:bg-gray-800 dark:border-gray-700 dark:text-white outline-none focus:ring-2 focus:ring-red-500 transition-all" value={credentials.user} onChange={e => setCredentials({...credentials, user: e.target.value})} required />
                  <input type="password" placeholder="Senha" className="w-full p-4 rounded-2xl border dark:bg-gray-800 dark:border-gray-700 dark:text-white outline-none focus:ring-2 focus:ring-red-500 transition-all" value={credentials.pass} onChange={e => setCredentials({...credentials, pass: e.target.value})} required />
                  <div className="flex items-center gap-3 bg-gray-50 dark:bg-gray-800 p-3 rounded-2xl border dark:border-gray-700">
                    <span className="bg-red-600 text-white px-3 py-1 rounded-lg font-bold select-none">{captcha.q} =</span>
                    <input type="number" placeholder="?" className="w-full bg-transparent dark:text-white outline-none font-bold text-center" value={credentials.captcha} onChange={e => setCredentials({...credentials, captcha: e.target.value})} required />
                  </div>
                  {error && <div className="text-red-500 text-sm font-bold flex items-center gap-2 px-1 animate-pulse"><AlertCircle size={16}/> {error}</div>}
                  <button disabled={loading} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-red-600/30 active:scale-95 disabled:opacity-50">
                    {loading ? 'AUTENTICANDO...' : 'ENTRAR NO SISTEMA'}
                  </button>
                </form>
              </div>
            </div>
          );
        }

        return (
          <div className="min-h-screen flex flex-col dark:bg-gray-950 dark:text-white transition-colors">
            <nav className="bg-white dark:bg-gray-900 border-b dark:border-gray-800 sticky top-0 z-50">
              <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <img src="https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/MARCA%20COLORIDA.png" className="h-10 dark:hidden" alt="Logo" />
                  <img src="https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png" className="h-10 hidden dark:block" alt="Logo" />
                </div>
                
                <div className="hidden md:flex items-center gap-2">
                  <NavBtn active={tab === 'search'} onClick={() => setTab('search')} icon={Search && <Search size={18}/>} label="Produtos" />
                  {user.role === 'admin' && <NavBtn active={tab === 'carnes'} onClick={() => setTab('carnes')} icon={FileText && <FileText size={18}/>} label="Carnês" />}
                  {['admin', 'editor'].includes(user.role) && <NavBtn active={tab === 'upload'} onClick={() => setTab('upload')} icon={Upload && <Upload size={18}/>} label="Upload" />}
                </div>

                <div className="flex items-center gap-3">
                  <div className="hidden sm:block text-right mr-2">
                     <p className="text-[10px] font-black uppercase text-gray-400">Olá, {user.name}</p>
                     <p className="text-[9px] font-bold text-red-500 uppercase">{user.role}</p>
                  </div>
                  <button onClick={() => {
                    setDarkMode(!darkMode);
                    document.documentElement.classList.toggle('dark');
                  }} className="p-3 bg-gray-50 dark:bg-gray-800 rounded-2xl transition hover:bg-gray-100 dark:hover:bg-gray-700">
                    {darkMode ? (Sun && <Sun size={20}/>) : (Moon && <Moon size={20}/>)}
                  </button>
                  <button onClick={logout} className="p-3 text-red-500 bg-red-50 dark:bg-red-900/20 rounded-2xl transition hover:bg-red-100 dark:hover:bg-red-900/40">
                    {LogOut && <LogOut size={20}/>}
                  </button>
                </div>
              </div>
              
              {/* Mobile Nav */}
              <div className="md:hidden flex border-t dark:border-gray-800">
                 <button onClick={() => setTab('search')} className={`flex-1 py-4 text-[10px] font-black uppercase transition ${tab === 'search' ? 'text-red-600 border-b-2 border-red-600 bg-red-50/10' : 'text-gray-400'}`}>Produtos</button>
                 {user.role === 'admin' && <button onClick={() => setTab('carnes')} className={`flex-1 py-4 text-[10px] font-black uppercase transition ${tab === 'carnes' ? 'text-red-600 border-b-2 border-red-600 bg-red-50/10' : 'text-gray-400'}`}>Carnês</button>}
                 {['admin', 'editor'].includes(user.role) && <button onClick={() => setTab('upload')} className={`flex-1 py-4 text-[10px] font-black uppercase transition ${tab === 'upload' ? 'text-red-600 border-b-2 border-red-600 bg-red-50/10' : 'text-gray-400'}`}>Upload</button>}
              </div>
            </nav>

            <main className="flex-grow max-w-7xl mx-auto w-full p-6 sm:p-10">
              {tab === 'search' && <SearchTab user={user} />}
              {tab === 'carnes' && <CarnesTab user={user} />}
              {tab === 'upload' && <UploadTab user={user} />}
            </main>
          </div>
        );
      }

      // --- COMPONENTES AUXILIARES ---

      function NavBtn({ active, onClick, icon, label }) {
        return (
          <button onClick={onClick} className={`flex items-center gap-2 px-5 py-2.5 rounded-2xl font-bold transition-all ${active ? 'bg-red-600 text-white shadow-lg shadow-red-600/30' : 'text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
            {icon} <span>{label}</span>
          </button>
        );
      }

      function SearchTab({ user }) {
        const [query, setQuery] = useState('');
        const [results, setResults] = useState([]);
        const [loading, setLoading] = useState(false);
        const [page, setPage] = useState(1);
        const itemsPerPage = 12;

        const handleSearch = async () => {
          if (!query) return;
          setLoading(true);
          let all = [];
          const paths = ['Fprodutos', 'VideosProdutos/Videos YT', 'VideosProdutos/Videos ML'];
          try {
            for (const path of paths) {
              const res = await fetch(`${API_BASE}/list?path=${encodeURIComponent(path)}`, {
                headers: { 'Authorization': `Bearer ${user.token}` }
              });
              const data = await res.json();
              const matches = Array.isArray(data) ? data.filter(f => f.ObjectName.toLowerCase().includes(query.toLowerCase())) : [];
              all = [...all, ...matches.map(f => ({ ...f, fullPath: `${path}/${f.ObjectName}` }))];
            }
            setResults(all);
            setPage(1);
          } catch (e) { 
            console.error("Search error:", e);
            alert("Erro ao carregar ficheiros."); 
          }
          finally { setLoading(false); }
        };

        const paginated = results.slice((page - 1) * itemsPerPage, page * itemsPerPage);

        return (
          <div className="space-y-8 animate-in fade-in duration-500">
            <div className="bg-white dark:bg-gray-900 p-5 rounded-[2.5rem] shadow-xl border dark:border-gray-800 flex flex-col md:flex-row gap-4">
              <div className="flex-grow relative">
                {Search && <Search className="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400" size={20}/>}
                <input type="text" placeholder="SKU ou nome do produto..." className="w-full pl-14 pr-6 py-4 rounded-3xl bg-gray-50 dark:bg-gray-800 border-none outline-none focus:ring-2 focus:ring-red-500 dark:text-white transition-all" value={query} onChange={e => setQuery(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSearch()} />
              </div>
              <button onClick={handleSearch} className="bg-red-600 text-white px-12 py-4 rounded-3xl font-extrabold hover:bg-red-700 transition shadow-lg shadow-red-600/20 active:scale-95">
                {loading ? 'A BUSCAR...' : 'BUSCAR AGORA'}
              </button>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
              {paginated.map((file, i) => (
                <FileCard key={i} file={file} user={user} />
              ))}
            </div>

            {results.length > itemsPerPage && (
              <div className="flex justify-center items-center gap-8 pt-12">
                <button disabled={page === 1} onClick={() => setPage(p => p - 1)} className="p-4 bg-white dark:bg-gray-900 border dark:border-gray-800 rounded-3xl disabled:opacity-20 font-bold hover:shadow-lg transition">Anterior</button>
                <span className="font-black text-gray-400 uppercase tracking-widest text-xs">Página {page} de {Math.ceil(results.length / itemsPerPage)}</span>
                <button disabled={page >= Math.ceil(results.length / itemsPerPage)} onClick={() => setPage(p => p + 1)} className="p-4 bg-white dark:bg-gray-900 border dark:border-gray-800 rounded-3xl disabled:opacity-20 font-bold hover:shadow-lg transition">Próxima</button>
              </div>
            )}
          </div>
        );
      }

      function FileCard({ file, user }) {
        const ext = file.ObjectName.split('.').pop().toLowerCase();
        const isImg = ['jpg', 'png', 'webp', 'gif', 'jpeg'].includes(ext);
        const url = `${PUBLIC_CDN}/${encodeURIComponentPath(file.fullPath)}`;

        return (
          <div className="bg-white dark:bg-gray-900 rounded-3xl overflow-hidden shadow-sm border dark:border-gray-800 group transition-all hover:shadow-2xl hover:-translate-y-1 relative">
            <div className="aspect-square bg-gray-100 dark:bg-gray-950 flex items-center justify-center relative overflow-hidden">
               {isImg ? 
                 <img src={url} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" loading="lazy" alt={file.ObjectName} /> :
                 (Film && <Film className="text-gray-400 opacity-20" size={64} />)
               }
               <div className="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center gap-3 backdrop-blur-[2px]">
                  <button onClick={() => window.open(url, '_blank')} className="p-3 bg-white text-black rounded-full hover:bg-red-600 hover:text-white transition-transform transform hover:scale-110 shadow-lg">{Search && <Search size={20}/>}</button>
                  <button onClick={() => downloadFile(file.fullPath, user)} className="p-3 bg-white text-black rounded-full hover:bg-red-600 hover:text-white transition-transform transform hover:scale-110 shadow-lg">{Download && <Download size={20}/>}</button>
               </div>
            </div>
            <div className="p-4">
              <p className="text-[10px] font-black truncate dark:text-gray-300 uppercase tracking-tighter" title={file.ObjectName}>{file.ObjectName}</p>
              <p className="text-[9px] text-gray-500 font-bold mt-1">{(file.Length / 1024 / 1024).toFixed(2)} MB</p>
            </div>
          </div>
        );
      }

      function CarnesTab({ user }) {
        const [path, setPath] = useState('Carnes');
        const [items, setItems] = useState([]);
        const [loading, setLoading] = useState(false);
        const [search, setSearch] = useState('');

        const fetchFolder = async (folder) => {
          setLoading(true);
          try {
            const res = await fetch(`${API_BASE}/list?path=${encodeURIComponent(folder)}`, {
              headers: { 'Authorization': `Bearer ${user.token}` }
            });
            const data = await res.json();
            setItems(Array.isArray(data) ? data : []);
            setPath(folder);
          } catch (e) { alert("Erro ao carregar dados."); }
          finally { setLoading(false); }
        };

        useEffect(() => { fetchFolder('Carnes'); }, []);

        const filtered = items.filter(i => i.ObjectName.toLowerCase().includes(search.toLowerCase()));

        return (
          <div className="space-y-6">
            <div className="flex items-center gap-2 overflow-x-auto scrollbar-hide pb-4">
              <div className="flex items-center gap-2 bg-white dark:bg-gray-900 px-4 py-2 rounded-2xl border dark:border-gray-800 shadow-sm">
                {path.split('/').map((p, i, arr) => (
                  <React.Fragment key={i}>
                    <button onClick={() => fetchFolder(arr.slice(0, i+1).join('/'))} className="font-black text-xs hover:text-red-600 transition whitespace-nowrap uppercase tracking-widest">{p}</button>
                    {i < arr.length - 1 && (ChevronRight && <ChevronRight size={14} className="opacity-20" />)}
                  </React.Fragment>
                ))}
              </div>
            </div>

            <div className="bg-white dark:bg-gray-900 rounded-[2.5rem] border dark:border-gray-800 shadow-2xl overflow-hidden">
              <div className="p-6 border-b dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/30">
                 <div className="relative">
                   {Search && <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" size={16}/>}
                   <input type="text" placeholder="Filtrar nesta pasta..." className="w-full pl-12 pr-4 py-3 rounded-2xl bg-white dark:bg-gray-800 border-none outline-none dark:text-white text-sm shadow-inner" value={search} onChange={e => setSearch(e.target.value)} />
                 </div>
              </div>
              {loading ? <div className="p-32 text-center text-gray-400 animate-pulse font-bold tracking-widest uppercase">A CARREGAR...</div> : (
                <div className="divide-y dark:divide-gray-800 max-h-[600px] overflow-y-auto">
                  {filtered.length === 0 && <div className="p-20 text-center text-gray-400 text-sm">Nenhum arquivo ou pasta encontrada.</div>}
                  {filtered.map((item, i) => (
                    <div key={i} className="p-6 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-800/50 cursor-pointer transition group" onClick={() => item.IsDirectory && fetchFolder(`${path}/${item.ObjectName}`)}>
                      <div className="flex items-center gap-5">
                        <div className={`p-4 rounded-2xl ${item.IsDirectory ? 'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600' : 'bg-blue-50 dark:bg-blue-900/20 text-blue-600'}`}>
                          {item.IsDirectory ? (Folder && <Folder size={24}/>) : (FileText && <FileText size={24}/>)}
                        </div>
                        <div>
                          <span className="font-extrabold text-sm dark:text-gray-200 group-hover:text-red-600 transition uppercase tracking-tighter">{item.ObjectName}</span>
                          {!item.IsDirectory && <p className="text-[9px] font-black uppercase text-gray-400 mt-1 tracking-widest">{(item.Length/1024).toFixed(1)} KB</p>}
                        </div>
                      </div>
                      {!item.IsDirectory && <button onClick={(e) => { e.stopPropagation(); downloadFile(`${path}/${item.ObjectName}`, user); }} className="p-4 bg-gray-50 dark:bg-gray-800 hover:bg-red-600 hover:text-white rounded-2xl transition shadow-sm">{Download && <Download size={20}/>}</button>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      }

      function UploadTab({ user }) {
        const [file, setFile] = useState(null);
        const [target, setTarget] = useState('Fprodutos');
        const [uploading, setUploading] = useState(false);
        const [status, setStatus] = useState(null);

        const handleUpload = async (e) => {
          e.preventDefault();
          if (!file) return;
          setUploading(true);
          setStatus(null);

          const form = new FormData();
          form.append('file', file);
          form.append('path', `${target}/${file.name}`);

          try {
            const res = await fetch(`${API_BASE}/upload`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${user.token}` },
              body: form
            });
            if (res.ok) {
              setStatus({ type: 'success', msg: 'Ficheiro guardado com sucesso na Bunny.net!' });
              setFile(null);
            } else {
              setStatus({ type: 'error', msg: 'Falha ao processar o upload.' });
            }
          } catch (e) { setStatus({ type: 'error', msg: 'Erro de ligação com o servidor.' }); }
          finally { setUploading(false); }
        };

        return (
          <div className="max-w-xl mx-auto bg-white dark:bg-gray-900 p-10 rounded-[3rem] shadow-2xl border dark:border-gray-800 animate-in slide-in-from-bottom-5 duration-500">
            <div className="flex items-center gap-4 mb-10">
              <div className="p-4 bg-red-600 text-white rounded-2xl shadow-lg shadow-red-600/30">
                 {Upload && <Upload size={32}/>}
              </div>
              <div>
                 <h2 className="text-2xl font-black tracking-tight uppercase">Central de Upload</h2>
                 <p className="text-gray-400 text-[10px] font-black uppercase tracking-widest">Gestão de Mídias Bunny</p>
              </div>
            </div>

            <form onSubmit={handleUpload} className="space-y-8">
              <div className="space-y-2">
                <label className="text-[10px] font-black uppercase text-gray-400 ml-1 tracking-widest">Pasta de Destino</label>
                <select className="w-full p-4 rounded-2xl bg-gray-50 dark:bg-gray-800 border dark:border-gray-700 outline-none font-bold text-sm shadow-inner" value={target} onChange={e => setTarget(e.target.value)}>
                  <option value="Fprodutos">Fotos de Produtos (Fprodutos)</option>
                  <option value="VideosProdutos/Videos YT">Vídeos para YouTube</option>
                  <option value="VideosProdutos/Videos ML">Vídeos para Mercado Livre</option>
                </select>
              </div>
              
              <div className="border-4 border-dashed dark:border-gray-800 p-12 rounded-[2.5rem] text-center hover:border-red-500 transition-all cursor-pointer relative group bg-gray-50/30 dark:bg-gray-800/20">
                <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" onChange={e => setFile(e.target.files[0])} />
                {file ? (
                  <div className="flex flex-col items-center animate-in zoom-in duration-300">
                     <div className="p-4 bg-green-50 dark:bg-green-900/20 text-green-600 rounded-full mb-3">{CheckCircle && <CheckCircle size={40} />}</div>
                     <p className="font-extrabold text-sm break-all px-4 tracking-tighter uppercase">{file.name}</p>
                     <p className="text-[9px] font-black text-gray-400 uppercase mt-2 tracking-widest">Pronto para carregar</p>
                  </div>
                ) : (
                  <div className="opacity-40 group-hover:opacity-100 transition-all transform group-hover:scale-105">
                    {Image && <Image className="mx-auto mb-4" size={56} />}
                    <p className="font-black text-xs uppercase tracking-widest">Arraste ou clique para selecionar</p>
                    <p className="text-[9px] font-bold text-gray-500 mt-2 uppercase tracking-widest">Imagens e vídeos permitidos</p>
                  </div>
                )}
              </div>

              {status && (
                <div className={`p-5 rounded-[1.5rem] font-bold text-xs flex items-center gap-3 animate-in fade-in duration-300 ${status.type === 'success' ? 'bg-green-50 text-green-700 dark:bg-green-900/20' : 'bg-red-50 text-red-700 dark:bg-red-900/20'}`}>
                  {status.type === 'success' ? (CheckCircle && <CheckCircle size={20}/>) : (AlertCircle && <AlertCircle size={20}/>)} 
                  <span className="flex-1 uppercase tracking-tighter">{status.msg}</span>
                </div>
              )}

              <button disabled={!file || uploading} className="w-full bg-black dark:bg-red-600 text-white font-black py-5 rounded-2xl hover:opacity-90 transition-all shadow-xl shadow-red-600/20 disabled:opacity-20 active:scale-95 uppercase tracking-widest text-sm">
                {uploading ? 'A ENVIAR PARA O SERVIDOR...' : 'INICIAR UPLOAD AGORA'}
              </button>
            </form>
          </div>
        );
      }

      // --- HELPERS ---

      async function downloadFile(path, user) {
        try {
          const res = await fetch(`${API_BASE}/download?path=${encodeURIComponent(path)}`, {
            headers: { 'Authorization': `Bearer ${user.token}` }
          });
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = path.split('/').pop();
          document.body.appendChild(a);
          a.click();
          a.remove();
        } catch (e) { alert("Falha no download."); }
      }

      function encodeURIComponentPath(path) {
        return path.split('/').map(encodeURIComponent).join('/');
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    })();
  </script>
</body>
