<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Interno - Lojas Alvorada</title>
  <link rel="icon" href="https://lojasalvorada.b-cdn.net/favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#E30613', // Vermelho típico de varejo (ajuste para a cor da sua logo)
              dark: '#B0000A'
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Estilos extras que o Tailwind não cobre perfeitamente */
    .loader {
      border: 4px solid #f3f3f3; border-top: 4px solid #E30613;
      border-radius: 50%; width: 40px; height: 40px;
      animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Scrollbar customizada */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300 min-h-screen flex flex-col">

  <!-- ================= TELA DE LOGIN ================= -->
  <div id="loginScreen" class="flex-grow flex items-center justify-center p-4 fade-in">
    <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-200 dark:border-gray-700">
      <div class="text-center mb-8">
        <img id="loginLogo" src="https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png" alt="Logo Lojas Alvorada" class="h-16 mx-auto object-contain">
        <h2 class="text-2xl font-bold mt-4">Painel Interno</h2>
        <p class="text-gray-500 dark:text-gray-400 text-sm">Acesso restrito a colaboradores</p>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium mb-1">Senha de Acesso</label>
          <input type="password" id="passwordInput" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-brand outline-none transition" placeholder="Digite a senha" required>
        </div>

        <!-- Captcha Simples -->
        <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-lg border border-gray-200 dark:border-gray-600">
          <label class="block text-sm font-medium mb-2">Verificação de Segurança</label>
          <div class="flex items-center gap-3">
            <span id="captchaQuestion" class="font-bold text-lg tracking-wider bg-gray-200 dark:bg-gray-800 px-3 py-1 rounded select-none">? + ?</span>
            <span class="font-bold">=</span>
            <input type="number" id="captchaInput" class="w-full p-2 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-brand outline-none text-center" placeholder="Resultado" required>
          </div>
        </div>

        <button type="submit" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg shadow-brand/30">
          Entrar no Sistema
        </button>
        <div id="loginError" class="text-red-500 text-sm text-center hidden mt-2 font-medium"></div>
      </form>
    </div>
  </div>

  <!-- ================= TELA PRINCIPAL (SISTEMA) ================= -->
  <div id="mainScreen" class="hidden flex-col min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <img id="headerLogo" src="https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png" alt="Logo Lojas Alvorada" class="h-10 sm:h-12 object-contain">
        
        <div class="flex items-center gap-2 sm:gap-4">
          <button id="toggleViewMode" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition flex items-center gap-2 text-sm sm:text-base" title="Alternar Visualização">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            <span class="hidden sm:inline" id="viewModeText">Lista</span>
          </button>
          <button id="darkModeToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition" title="Alternar Tema">
            ☀️
          </button>
          <button id="logoutBtn" class="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition" title="Sair">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
      <!-- Barra de Busca -->
      <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm mb-8 flex flex-col sm:flex-row gap-4 border border-gray-200 dark:border-gray-700">
        <div class="relative flex-grow">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </div>
          <input type="text" id="searchInput" class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-brand outline-none" placeholder="Digite o SKU ou nome (ex: blusa infantil)..." />
        </div>
        
        <select id="fileTypeFilter" class="py-3 px-4 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-brand outline-none sm:w-48">
          <option value="">Todos os formatos</option>
          <option value=".jpg">Imagens (.jpg)</option>
          <option value=".png">Imagens (.png)</option>
          <option value=".mp4">Vídeos (.mp4)</option>
        </select>
        
        <button id="searchBtn" class="bg-brand hover:bg-brand-dark text-white font-bold py-3 px-6 rounded-lg transition duration-200 flex items-center justify-center gap-2">
          Buscar
        </button>
      </div>

      <!-- Estados da Busca -->
      <div id="loading" class="hidden py-12 text-center">
        <div class="loader mb-4"></div>
        <p class="text-gray-500 font-medium">Buscando e organizando arquivos...</p>
      </div>

      <div id="noResults" class="hidden py-12 text-center fade-in">
        <div class="text-6xl mb-4">📭</div>
        <h3 class="text-xl font-bold mb-2">Nenhum arquivo encontrado</h3>
        <p class="text-gray-500">Tente buscar por outro código ou remova os filtros.</p>
      </div>

      <!-- Container de Resultados -->
      <div id="results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6 transition-all duration-300"></div>

      <!-- Paginação -->
      <div id="pagination" class="hidden mt-8 flex justify-center items-center gap-4 bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
        <button id="prevPageBtn" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed transition">Anterior</button>
        <span id="pageInfo" class="font-medium text-gray-600 dark:text-gray-300">Página 1 de 1</span>
        <button id="nextPageBtn" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed transition">Próxima</button>
      </div>

      <div class="text-center mt-8">
        <button id="downloadAllBtn" class="hidden bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg transition duration-200 shadow-lg shadow-green-600/30 items-center justify-center gap-2 mx-auto">
          <svg class="w-5 h-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          Baixar Arquivos Desta Página
        </button>
      </div>
    </main>

    <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-6 mt-auto">
      <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
        &copy; <span id="currentYear"></span> Lojas Alvorada - Perfect Comércio de Confecções Ltda. Sistema de uso interno.
      </div>
    </footer>
  </div>

  <script>
    // ================= CONFIGURAÇÕES =================
    // ATENÇÃO: Troque esta URL pela sua nova URL do Render!
    const PROXY_URL = 'https://bunny-proxy.onrender.com'; 
    const PUBLIC_URL = 'https://lojasalvorada.b-cdn.net';
    const PATHS = ['Fprodutos', 'VideosProdutos/Videos YT', 'VideosProdutos/Videos ML'];
    
    // Configurações de Paginação
    const ITEMS_PER_PAGE = 15;
    let currentPage = 1;
    let totalPages = 1;

    // Estado global
    let currentMatches = [];
    let fileCache = {};
    let isListView = false;
    let captchaExpected = 0;

    // ================= UI & TEMA =================
    function initTheme() {
      const isDark = localStorage.getItem('darkMode') !== 'false'; // Padrão é dark
      setTheme(isDark);
      document.getElementById('currentYear').textContent = new Date().getFullYear();
    }

    function setTheme(isDark) {
      if (isDark) {
        document.documentElement.classList.add('dark');
        document.getElementById('darkModeToggle').textContent = '☀️';
        document.getElementById('loginLogo').src = 'https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png';
        document.getElementById('headerLogo').src = 'https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png';
      } else {
        document.documentElement.classList.remove('dark');
        document.getElementById('darkModeToggle').textContent = '🌙';
        document.getElementById('loginLogo').src = 'https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/MARCA%20COLORIDA.png';
        document.getElementById('headerLogo').src = 'https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/MARCA%20COLORIDA.png';
      }
      localStorage.setItem('darkMode', isDark);
    }

    function toggleViewMode() {
      isListView = !isListView;
      const resultsEl = document.getElementById('results');
      const textEl = document.getElementById('viewModeText');
      
      if (isListView) {
        resultsEl.className = 'flex flex-col gap-3 transition-all duration-300';
        textEl.textContent = 'Galeria';
      } else {
        resultsEl.className = 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6 transition-all duration-300';
        textEl.textContent = 'Lista';
      }
      
      if (currentMatches.length > 0) renderPage(currentPage);
    }

    // ================= AUTENTICAÇÃO E CAPTCHA =================
    function generateCaptcha() {
      const num1 = Math.floor(Math.random() * 10) + 1;
      const num2 = Math.floor(Math.random() * 10) + 1;
      captchaExpected = num1 + num2;
      document.getElementById('captchaQuestion').textContent = `${num1} + ${num2}`;
      document.getElementById('captchaInput').value = '';
    }

    function checkAuth() {
      const token = localStorage.getItem('alvorada_token');
      if (token) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('flex');
      } else {
        generateCaptcha();
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('flex');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      const captchaInput = parseInt(document.getElementById('captchaInput').value);
      const errorEl = document.getElementById('loginError');

      if (captchaInput !== captchaExpected) {
        errorEl.textContent = "Verificação de segurança incorreta. Tente novamente.";
        errorEl.classList.remove('hidden');
        generateCaptcha();
        return;
      }

      errorEl.classList.add('hidden');
      const btn = e.target.querySelector('button');
      btn.innerHTML = '<div class="loader" style="width:20px;height:20px;border-top-color:#fff"></div>';
      btn.disabled = true;

      try {
        const response = await fetch(`${PROXY_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          localStorage.setItem('alvorada_token', data.token);
          checkAuth();
        } else {
          errorEl.textContent = data.error || "Senha incorreta.";
          errorEl.classList.remove('hidden');
          generateCaptcha();
        }
      } catch (err) {
        errorEl.textContent = "Erro ao conectar com o servidor.";
        errorEl.classList.remove('hidden');
      } finally {
        btn.innerHTML = 'Entrar no Sistema';
        btn.disabled = false;
        document.getElementById('passwordInput').value = '';
      }
    }

    function logout() {
      localStorage.removeItem('alvorada_token');
      currentMatches = [];
      document.getElementById('results').innerHTML = '';
      document.getElementById('pagination').classList.add('hidden');
      document.getElementById('downloadAllBtn').classList.add('hidden');
      checkAuth();
    }

    // ================= BUSCA E FETCH =================
    async function fetchWithAuth(url, isDownload = false) {
      const token = localStorage.getItem('alvorada_token');
      const options = {
        headers: { 'Authorization': `Bearer ${token}` }
      };

      const res = await fetch(url, options);
      if (res.status === 401 || res.status === 403) {
        logout();
        throw new Error('Sessão expirada. Faça login novamente.');
      }
      return res;
    }

    async function searchFiles() {
      const input = document.getElementById('searchInput').value.trim().toLowerCase();
      const terms = input.split(/[,\s]+/).filter(Boolean);
      const fileType = document.getElementById('fileTypeFilter').value;
      
      const resultsEl = document.getElementById('results');
      const loadingEl = document.getElementById('loading');
      const noResultsEl = document.getElementById('noResults');
      const downloadAllBtn = document.getElementById('downloadAllBtn');
      const paginationEl = document.getElementById('pagination');

      resultsEl.innerHTML = '';
      currentMatches = [];
      loadingEl.classList.remove('hidden');
      noResultsEl.classList.add('hidden');
      downloadAllBtn.classList.add('hidden');
      paginationEl.classList.add('hidden');

      if (!terms.length) {
        alert("Por favor, digite um código ou nome para buscar.");
        loadingEl.classList.add('hidden');
        return;
      }

      try {
        for (const path of PATHS) {
          if (!fileCache[path]) {
            const res = await fetchWithAuth(`${PROXY_URL}/list?path=${encodeURIComponent(path)}`);
            fileCache[path] = await res.json();
          }

          const files = fileCache[path];
          const matches = files.filter((file) => {
            const name = file.ObjectName.toLowerCase();
            const ext = '.' + name.split('.').pop();
            return terms.some((t) => name.includes(t)) && (!fileType || ext === fileType);
          });

          matches.forEach((file) => {
            currentMatches.push({
              path: `${path}/${file.ObjectName}`,
              name: file.ObjectName,
              size: file.Length,
              date: file.LastChanged
            });
          });
        }
      } catch (err) {
        console.error(err);
        if(err.message !== 'Sessão expirada. Faça login novamente.'){
           alert("Erro ao buscar arquivos: " + err.message);
        }
      }

      loadingEl.classList.add('hidden');

      if (currentMatches.length === 0) {
        noResultsEl.classList.remove('hidden');
      } else {
        currentPage = 1;
        totalPages = Math.ceil(currentMatches.length / ITEMS_PER_PAGE);
        renderPage(currentPage);
        downloadAllBtn.classList.remove('hidden');
        
        if (totalPages > 1) {
          paginationEl.classList.remove('hidden');
          paginationEl.classList.add('flex');
        }
      }
    }

    // ================= RENDERIZAÇÃO E PAGINAÇÃO =================
    function renderPage(page) {
      const resultsEl = document.getElementById('results');
      resultsEl.innerHTML = '';
      
      const start = (page - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const pageItems = currentMatches.slice(start, end);

      pageItems.forEach((file) => {
        const ext = file.name.split('.').pop().toLowerCase();
        const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext);
        const isVideo = ['mp4', 'webm', 'mov'].includes(ext);
        const fileUrl = `${PUBLIC_URL}/${encodeURIComponentPath(file.path)}`;

        const item = document.createElement('div');
        item.className = `bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden hover:shadow-md transition-shadow fade-in group relative ${isListView ? 'flex items-center gap-4 p-3' : 'flex flex-col'}`;

        // Mídia
        const mediaContainer = document.createElement('div');
        mediaContainer.className = isListView ? 'w-24 h-24 flex-shrink-0 bg-gray-100 dark:bg-gray-900 rounded-lg overflow-hidden' : 'aspect-square bg-gray-100 dark:bg-gray-900 relative overflow-hidden';
        
        if (isImage) {
          mediaContainer.innerHTML = `<img src="${fileUrl}" loading="lazy" alt="${file.name}" class="w-full h-full object-cover cursor-pointer hover:scale-105 transition-transform" onclick="window.open('${fileUrl}', '_blank')">`;
        } else if (isVideo) {
          mediaContainer.innerHTML = `<video src="${fileUrl}" class="w-full h-full object-cover" controls preload="metadata"></video>`;
        } else {
          mediaContainer.innerHTML = `<div class="w-full h-full flex items-center justify-center text-4xl">📄</div>`;
        }

        // Informações
        const infoContainer = document.createElement('div');
        infoContainer.className = isListView ? 'flex-grow min-w-0' : 'p-3 flex flex-col flex-grow';
        
        infoContainer.innerHTML = `
          <p class="font-semibold text-sm truncate" title="${file.name}">${file.name}</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">${formatBytes(file.size)} &bull; ${formatDate(file.date)}</p>
          
          <div class="mt-auto pt-3 flex flex-wrap gap-2 ${isListView ? '' : 'justify-center'}">
            <button onclick="downloadFile('${encodeURIComponent(file.path)}')" class="flex-1 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-800 dark:text-white text-xs font-semibold py-2 px-3 rounded flex items-center justify-center gap-1 transition">
              ⬇️ Baixar
            </button>
            ${window.innerWidth < 768 && (isImage || isVideo) ? 
              `<button onclick="shareWhatsApp('${fileUrl}')" class="flex-1 bg-green-500 hover:bg-green-600 text-white text-xs font-semibold py-2 px-3 rounded flex items-center justify-center gap-1 transition">
                📤 Zap
              </button>` : ''}
          </div>
        `;

        item.appendChild(mediaContainer);
        item.appendChild(infoContainer);
        resultsEl.appendChild(item);
      });

      updatePaginationControls();
    }

    function updatePaginationControls() {
      document.getElementById('pageInfo').textContent = `Página ${currentPage} de ${totalPages}`;
      document.getElementById('prevPageBtn').disabled = currentPage === 1;
      document.getElementById('nextPageBtn').disabled = currentPage === totalPages;
    }

    // ================= FUNÇÕES UTILITÁRIAS =================
    function formatBytes(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      const kb = bytes / 1024;
      if (kb < 1024) return `${kb.toFixed(1)} KB`;
      return `${(kb / 1024).toFixed(1)} MB`;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('pt-BR');
    }

    function encodeURIComponentPath(path) {
      return path.split('/').map(encodeURIComponent).join('/');
    }

    // ================= DOWNLOADS =================
    async function downloadFile(encodedPath) {
      const token = localStorage.getItem('alvorada_token');
      // Como não podemos mandar header de auth no <a> direto, fazemos fetch do blob
      try {
        const res = await fetch(`${PROXY_URL}/download?path=${encodedPath}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!res.ok) throw new Error('Falha no download');
        
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = decodeURIComponent(encodedPath.split('/').pop());
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
      } catch(err) {
        alert("Erro ao baixar o arquivo. Verifique sua conexão.");
      }
    }

    async function downloadAllPage() {
      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const pageItems = currentMatches.slice(start, end);
      
      if (!pageItems.length) return;

      const btn = document.getElementById('downloadAllBtn');
      const originalText = btn.innerHTML;
      btn.innerHTML = `<div class="loader inline-block align-middle" style="width:20px;height:20px;border-top-color:#fff;margin-right:10px;"></div> Baixando...`;
      btn.disabled = true;

      for (let i = 0; i < pageItems.length; i++) {
        await downloadFile(encodeURIComponent(pageItems[i].path));
        // Pequena pausa para não travar o navegador com múltiplos downloads simultâneos
        await new Promise(r => setTimeout(r, 800)); 
      }

      btn.innerHTML = originalText;
      btn.disabled = false;
    }

    function shareWhatsApp(url) {
      const msg = `Confira este produto da Lojas Alvorada: ${url}`;
      const waUrl = `https://wa.me/?text=${encodeURIComponent(msg)}`;
      window.open(waUrl, '_blank');
    }

    // ================= EVENT LISTENERS =================
    window.addEventListener('DOMContentLoaded', () => {
      initTheme();
      checkAuth();
      
      document.getElementById('darkModeToggle').addEventListener('click', () => {
        setTheme(!document.documentElement.classList.contains('dark'));
      });
      document.getElementById('toggleViewMode').addEventListener('click', toggleViewMode);
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('searchBtn').addEventListener('click', searchFiles);
      document.getElementById('downloadAllBtn').addEventListener('click', downloadAllPage);
      
      document.getElementById('prevPageBtn').addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; renderPage(currentPage); window.scrollTo({top: 0, behavior: 'smooth'}); }
      });
      
      document.getElementById('nextPageBtn').addEventListener('click', () => {
        if (currentPage < totalPages) { currentPage++; renderPage(currentPage); window.scrollTo({top: 0, behavior: 'smooth'}); }
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !document.getElementById('mainScreen').classList.contains('hidden')) {
        // Só busca se o foco estiver no input de busca para não conflitar com botões
        if (document.activeElement === document.getElementById('searchInput')) {
          searchFiles();
        }
      }
    });
  </script>
</body>
</html>
