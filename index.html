<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Interno - Lojas Alvorada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/lucide-react@latest"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
    .dark { background: #0b0e14; color: white; }
    .btn-blue { background-color: #0e75d7; }
    .text-blue { color: #0e75d7; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #0e75d7; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #0e75d7; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, Fragment } = React;
    const { 
      Search, Upload, FileText, LogOut, Moon, Sun, Folder, 
      ChevronRight, Download, Image, Film, Lock, CheckCircle, 
      AlertCircle, Eye, EyeOff, LayoutGrid, List, Info, X, Files
    } = LucideReact;

    const API_BASE = 'https://bunny-proxy.onrender.com/api'; 
    const PUBLIC_CDN = 'https://lojasalvorada.b-cdn.net';

    function App() {
      const [user, setUser] = useState(null);
      const [tab, setTab] = useState('search');
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem('alvorada_theme') !== 'light');
      const [loading, setLoading] = useState(false);
      
      // Login
      const [captcha, setCaptcha] = useState({ q: '', a: 0 });
      const [form, setForm] = useState({ user: '', pass: '', cap: '' });
      const [showPass, setShowPass] = useState(false);
      const [loginError, setLoginError] = useState('');

      useEffect(() => {
        const session = localStorage.getItem('alvorada_session');
        if (session) setUser(JSON.parse(session));
        genCaptcha();
        document.documentElement.classList.toggle('dark', darkMode);
      }, []);

      const genCaptcha = () => {
        const n1 = Math.floor(Math.random() * 9) + 1;
        const n2 = Math.floor(Math.random() * 9) + 1;
        setCaptcha({ q: `${n1} + ${n2}`, a: n1 + n2 });
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        if (parseInt(form.cap) !== captcha.a) {
          setLoginError('Soma incorreta. Tente novamente.');
          genCaptcha();
          return;
        }
        setLoading(true);
        setLoginError('');
        try {
          const res = await fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: form.user, password: form.pass })
          });
          const data = await res.json();
          if (res.ok) {
            setUser(data);
            localStorage.setItem('alvorada_session', JSON.stringify(data));
          } else {
            setLoginError(data.error);
            genCaptcha();
          }
        } catch (err) { setLoginError('Servidor offline'); }
        setLoading(false);
      };

      const toggleTheme = () => {
        const newVal = !darkMode;
        setDarkMode(newVal);
        localStorage.setItem('alvorada_theme', newVal ? 'dark' : 'light');
        document.documentElement.classList.toggle('dark', newVal);
      };

      if (!user) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50 dark:bg-[#0b0e14]">
            <div className="w-full max-w-md bg-white dark:bg-[#161b22] p-8 rounded-[2rem] shadow-2xl border dark:border-gray-800">
              <div className="text-center mb-8">
                <img src={darkMode ? "https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png" : "https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/MARCA%20COLORIDA.png"} className="h-14 mx-auto mb-4" />
                <h1 className="text-2xl font-black dark:text-white uppercase tracking-tighter">Acesso Interno</h1>
              </div>
              <form onSubmit={handleLogin} className="space-y-4">
                <div className="space-y-1">
                  <label className="text-[10px] font-black uppercase text-gray-400 ml-1">Usuário</label>
                  <input type="text" placeholder="Seu nome de usuário" className="w-full p-4 rounded-2xl bg-gray-100 dark:bg-[#0d1117] dark:text-white border-none outline-none focus:ring-2 focus:ring-[#0e75d7]" value={form.user} onChange={e => setForm({...form, user: e.target.value})} required />
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] font-black uppercase text-gray-400 ml-1">Senha</label>
                  <div className="relative">
                    <input type={showPass ? "text" : "password"} placeholder="Sua senha"  className="w-full p-4 rounded-2xl bg-gray-100 dark:bg-[#0d1117] dark:text-white border-none outline-none focus:ring-2 focus:ring-[#0e75d7]" value={form.pass} onChange={e => setForm({...form, pass: e.target.value})} required />
                    <button type="button" onClick={() => setShowPass(!showPass)} className="absolute right-4 top-4 text-gray-400 hover:text-[#0e75d7]">
                      {showPass ? <EyeOff size={20}/> : <Eye size={20}/>}
                    </button>
                  </div>
                </div>
                <div className="bg-blue-50 dark:bg-blue-900/10 p-4 rounded-2xl border border-blue-100 dark:border-blue-900/30">
                  <p className="text-[10px] font-bold text-blue-600 dark:text-blue-400 mb-2 uppercase">Resolva essa conta para provar que não é um robô:</p>
                  <div className="flex items-center gap-3">
                    <span className="font-black text-xl text-[#0e75d7]">{captcha.q} =</span>
                    <input type="number" placeholder="Sua resposta aqui" className="w-full p-2 rounded-xl bg-white dark:bg-gray-800 dark:text-white border-2 border-blue-100 dark:border-blue-800 text-center font-bold focus:border-[#0e75d7] outline-none" value={form.cap} onChange={e => setForm({...form, cap: e.target.value})} required />
                  </div>
                </div>
                {loginError && <p className="text-red-500 text-xs font-bold text-center">{loginError}</p>}
                <button disabled={loading} className="w-full bg-[#0e75d7] hover:bg-[#0c64b8] text-white font-black py-4 rounded-2xl transition shadow-xl shadow-blue-600/20 active:scale-95">
                  {loading ? 'AUTENTICANDO...' : 'ENTRAR'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-white dark:bg-[#161b22] border-b dark:border-gray-800 h-20 flex items-center justify-between px-4 lg:px-8 sticky top-0 z-50 shadow-sm">
            <div className="flex items-center gap-6">
              <img src={darkMode ? "https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png" : "https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/MARCA%20COLORIDA.png"} className="h-8 lg:h-10" />
              <nav className="hidden lg:flex gap-2">
                <NavBtn active={tab === 'search'} onClick={() => setTab('search')} icon={<Search size={18}/>} label="Consultar" />
                {user.role === 'admin' && <NavBtn active={tab === 'carnes'} onClick={() => setTab('carnes')} icon={<FileText size={18}/>} label="Carnês" />}
                {['admin', 'editor'].includes(user.role) && <NavBtn active={tab === 'upload'} onClick={() => setTab('upload')} icon={<Upload size={18}/>} label="Upload" />}
              </nav>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={toggleTheme} className="p-3 bg-gray-100 dark:bg-gray-800 rounded-2xl transition">
                {darkMode ? <Sun size={20} className="text-yellow-400"/> : <Moon size={20} className="text-blue-600"/>}
              </button>
              <button onClick={() => { setUser(null); localStorage.removeItem('alvorada_session'); }} className="p-3 text-red-500 bg-red-50 dark:bg-red-950/30 rounded-2xl">
                <LogOut size={20}/>
              </button>
            </div>
          </header>

          {/* Menu Mobile */}
          <nav className="lg:hidden flex border-b dark:border-gray-800 bg-white dark:bg-[#161b22]">
            <MobileNavBtn active={tab === 'search'} onClick={() => setTab('search')} icon={<Search size={18}/>} label="Busca" />
            {user.role === 'admin' && <MobileNavBtn active={tab === 'carnes'} onClick={() => setTab('carnes')} icon={<FileText size={18}/>} label="Carnês" />}
            {['admin', 'editor'].includes(user.role) && <MobileNavBtn active={tab === 'upload'} onClick={() => setTab('upload')} icon={<Upload size={18}/>} label="Enviar" />}
          </nav>

          <main className="flex-grow max-w-7xl mx-auto w-full p-4 lg:p-8">
            {tab === 'search' && <SearchTab user={user} />}
            {tab === 'carnes' && <CarnesTab user={user} />}
            {tab === 'upload' && <UploadTab user={user} />}
          </main>
          
          <footer className="p-6 text-center text-[10px] font-black uppercase text-gray-400 bg-white dark:bg-[#161b22] border-t dark:border-gray-800">
            Lojas Alvorada &copy; {new Date().getFullYear()} • Sistema Restrito
          </footer>
        </div>
      );
    }

    // --- SUBCOMPONENTS ---

    function NavBtn({ active, onClick, icon, label }) {
      return (
        <button onClick={onClick} className={`flex items-center gap-2 px-5 py-2.5 rounded-2xl font-bold transition-all ${active ? 'bg-blue-50 text-[#0e75d7] dark:bg-blue-900/20' : 'text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
          {icon} <span className="uppercase text-xs">{label}</span>
        </button>
      );
    }

    function MobileNavBtn({ active, onClick, icon, label }) {
      return (
        <button onClick={onClick} className={`flex-1 py-4 flex flex-col items-center gap-1 text-[10px] font-black uppercase transition ${active ? 'text-[#0e75d7] border-b-2 border-[#0e75d7]' : 'text-gray-400'}`}>
          {icon} {label}
        </button>
      );
    }

    function SearchTab({ user }) {
      const [q, setQ] = useState('');
      const [files, setFiles] = useState([]);
      const [loading, setLoading] = useState(false);
      const [page, setPage] = useState(1);
      const [view, setView] = useState('grid');
      const [filter, setFilter] = useState('all'); // all, image, video
      const perPage = 12;

      const performSearch = async () => {
        if (!q) return;
        setLoading(true);
        let all = [];
        const paths = ['Fprodutos', 'VideosProdutos/Videos YT', 'VideosProdutos/Videos ML'];
        try {
          for (const p of paths) {
            const res = await fetch(`${API_BASE}/list?path=${encodeURIComponent(p)}`, {
              headers: { 'Authorization': `Bearer ${user.token}` }
            });
            const data = await res.json();
            if (Array.isArray(data)) {
              const matches = data.filter(f => f.ObjectName.toLowerCase().includes(q.toLowerCase()));
              all = [...all, ...matches.map(f => ({ ...f, fullPath: `${p}/${f.ObjectName}` }))];
            }
          }
          setFiles(all);
          setPage(1);
        } catch (e) { alert("Busca falhou."); }
        setLoading(false);
      };

      const filtered = useMemo(() => {
        return files.filter(f => {
          const ext = f.ObjectName.split('.').pop().toLowerCase();
          const isImg = ['jpg','jpeg','png','webp','gif'].includes(ext);
          const isVid = ['mp4','mov','webm'].includes(ext);
          if (filter === 'image') return isImg;
          if (filter === 'video') return isVid;
          return true;
        });
      }, [files, filter]);

      const paginated = filtered.slice((page - 1) * perPage, page * perPage);

      const downloadAll = async () => {
        if (!confirm(`Baixar ${filtered.length} arquivos?`)) return;
        for (const f of filtered) {
          await download(f.ObjectName, f.fullPath.split('/').slice(0,-1).join('/'), user);
          await new Promise(r => setTimeout(r, 500));
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <div className="bg-white dark:bg-[#161b22] p-6 rounded-[2.5rem] shadow-xl border dark:border-gray-800 space-y-4">
            <div className="flex flex-col md:flex-row gap-3">
              <div className="flex-grow relative">
                <Search className="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400" size={20}/>
                <input className="w-full pl-14 pr-4 py-4 rounded-2xl bg-gray-50 dark:bg-[#0d1117] dark:text-white border-none outline-none focus:ring-2 focus:ring-[#0e75d7]" placeholder="SKU ou nome do produto..." value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key === 'Enter' && performSearch()} />
              </div>
              <button onClick={performSearch} className="bg-[#0e75d7] text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-blue-600/20 active:scale-95 transition">BUSCAR</button>
            </div>
            
            <div className="flex flex-wrap justify-between items-center gap-4 pt-4 border-t dark:border-gray-800">
              <div className="flex gap-2 bg-gray-100 dark:bg-gray-800 p-1 rounded-xl">
                {['all', 'image', 'video'].map(f => (
                  <button key={f} onClick={() => setFilter(f)} className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase transition ${filter === f ? 'bg-white dark:bg-gray-700 text-[#0e75d7] shadow-sm' : 'text-gray-400'}`}>
                    {f === 'all' ? 'Todos' : f === 'image' ? 'Imagens' : 'Vídeos'}
                  </button>
                ))}
              </div>
              <div className="flex items-center gap-3">
                <div className="flex gap-1 bg-gray-100 dark:bg-gray-800 p-1 rounded-xl">
                  <button onClick={() => setView('grid')} className={`p-2 rounded-lg ${view === 'grid' ? 'bg-white dark:bg-gray-700 text-[#0e75d7]' : 'text-gray-400'}`}><LayoutGrid size={18}/></button>
                  <button onClick={() => setView('list')} className={`p-2 rounded-lg ${view === 'list' ? 'bg-white dark:bg-gray-700 text-[#0e75d7]' : 'text-gray-400'}`}><List size={18}/></button>
                </div>
                {filtered.length > 0 && <button onClick={downloadAll} className="text-[#0e75d7] font-black text-[10px] uppercase flex items-center gap-1"><Download size={14}/> Baixar Tudo</button>}
              </div>
            </div>
          </div>

          {loading ? <div className="p-20 text-center"><div className="loader mx-auto"></div></div> : (
            <>
              <div className={view === 'grid' ? "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" : "space-y-2"}>
                {paginated.map((f, i) => <FileCard key={i} file={f} view={view} user={user} />)}
              </div>

              {filtered.length > perPage && (
                <div className="flex justify-center items-center gap-6 mt-12 bg-white dark:bg-[#161b22] p-4 rounded-3xl border dark:border-gray-800 shadow-lg w-fit mx-auto">
                  <button disabled={page === 1} onClick={() => setPage(p => p - 1)} className="font-bold disabled:opacity-20 px-4 py-2 hover:text-[#0e75d7]">Anterior</button>
                  <span className="text-xs font-black text-gray-400">PÁGINA {page} DE {Math.ceil(filtered.length / perPage)}</span>
                  <button disabled={page >= Math.ceil(filtered.length / perPage)} onClick={() => setPage(p => p + 1)} className="font-bold disabled:opacity-20 px-4 py-2 hover:text-[#0e75d7]">Próxima</button>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    function FileCard({ file, view, user }) {
      const [showDetail, setShowDetail] = useState(false);
      const ext = file.ObjectName.split('.').pop().toLowerCase();
      const isImg = ['jpg','jpeg','png','webp','gif'].includes(ext);
      const isVid = ['mp4','mov','webm'].includes(ext);
      const url = `${PUBLIC_CDN}/${file.fullPath.split('/').map(encodeURIComponent).join('/')}`;
      const sizeMb = (file.Length / 1024 / 1024).toFixed(2);
      const date = new Date(file.LastChanged).toLocaleDateString('pt-BR');

      if (view === 'list') {
        return (
          <div className="bg-white dark:bg-[#161b22] p-4 rounded-2xl border dark:border-gray-800 flex items-center justify-between gap-4 hover:border-[#0e75d7] transition group">
            <div className="flex items-center gap-4 flex-1 min-w-0">
              <div className="w-12 h-12 rounded-lg overflow-hidden bg-black flex-shrink-0">
                {isImg ? <img src={url} className="w-full h-full object-cover" /> : <Film className="m-auto h-full text-white" size={20}/>}
              </div>
              <div className="min-w-0">
                <p className="text-xs font-black truncate dark:text-white uppercase">{file.ObjectName}</p>
                <p className="text-[9px] font-bold text-gray-400 uppercase">{ext} • {sizeMb} MB • {date}</p>
              </div>
            </div>
            <div className="flex gap-2">
               <button onClick={() => window.open(url, '_blank')} className="p-3 bg-gray-100 dark:bg-gray-800 text-gray-500 rounded-xl"><Eye size={16}/></button>
               <button onClick={() => download(file.ObjectName, file.fullPath.split('/').slice(0,-1).join('/'), user)} className="p-3 bg-[#0e75d7] text-white rounded-xl shadow-lg shadow-blue-600/20"><Download size={16}/></button>
            </div>
          </div>
        );
      }

      return (
        <div className="bg-white dark:bg-[#161b22] rounded-[2rem] overflow-hidden shadow-sm border dark:border-gray-800 group hover:shadow-2xl transition relative">
          <div className="aspect-square bg-gray-100 dark:bg-[#0d1117] flex items-center justify-center relative overflow-hidden">
            {isImg ? <img src={url} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" loading="lazy" /> : <Film className="text-gray-400" size={32} />}
            <button onClick={() => setShowDetail(true)} className="absolute top-2 right-2 p-2 bg-black/40 text-white rounded-full"><Info size={14}/></button>
            <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-3 backdrop-blur-[2px]">
              <button onClick={() => window.open(url, '_blank')} className="p-3 bg-white text-black rounded-full hover:bg-[#0e75d7] hover:text-white transition"><Eye size={20}/></button>
              <button onClick={() => download(file.ObjectName, file.fullPath.split('/').slice(0,-1).join('/'), user)} className="p-3 bg-white text-black rounded-full hover:bg-[#0e75d7] hover:text-white transition"><Download size={20}/></button>
            </div>
          </div>
          <div className="p-3 text-center">
            <p className="text-[10px] font-black truncate dark:text-gray-300 uppercase">{file.ObjectName}</p>
            <button onClick={() => download(file.ObjectName, file.fullPath.split('/').slice(0,-1).join('/'), user)} className="mt-2 w-full flex items-center justify-center gap-1 py-2 bg-blue-50 dark:bg-blue-900/20 text-[#0e75d7] rounded-xl text-[9px] font-black uppercase">
               <Download size={12}/> Baixar
            </button>
          </div>
          {showDetail && (
            <div className="absolute inset-0 bg-white/95 dark:bg-[#161b22]/95 p-6 flex flex-col justify-center animate-in zoom-in duration-200">
               <button onClick={() => setShowDetail(false)} className="absolute top-4 right-4 text-gray-400"><X size={20}/></button>
               <h3 className="text-[10px] font-black uppercase text-[#0e75d7] mb-3">Detalhes</h3>
               <div className="text-[11px] font-bold text-gray-500 space-y-2 uppercase">
                  <p>Nome: <span className="text-black dark:text-white break-all">{file.ObjectName}</span></p>
                  <p>Tamanho: <span className="text-black dark:text-white">{sizeMb} MB</span></p>
                  <p>Formato: <span className="text-black dark:text-white">{ext}</span></p>
                  <p>Data: <span className="text-black dark:text-white">{date}</span></p>
               </div>
            </div>
          )}
        </div>
      );
    }

    function CarnesTab({ user }) {
      const [path, setPath] = useState('Carnes');
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(false);
      const [filter, setFilter] = useState('');

      const load = async (p) => {
        setLoading(true);
        try {
          const res = await fetch(`${API_BASE}/list?path=${encodeURIComponent(p)}`, {
            headers: { 'Authorization': `Bearer ${user.token}` }
          });
          const data = await res.json();
          setItems(Array.isArray(data) ? data : []);
          setPath(p);
        } catch (e) { alert("Erro ao carregar pasta."); }
        setLoading(false);
      };

      useEffect(() => { load('Carnes'); }, []);

      const filtered = items.filter(it => it.ObjectName.toLowerCase().includes(filter.toLowerCase()));

      return (
        <div className="space-y-4 animate-in fade-in duration-500">
          <div className="flex items-center gap-2 overflow-x-auto pb-4 scrollbar-hide">
            <div className="bg-white dark:bg-[#161b22] px-4 py-2 rounded-2xl border dark:border-gray-800 flex items-center gap-2 whitespace-nowrap">
              <Folder size={16} className="text-[#0e75d7]"/>
              {path.split('/').map((p, i, arr) => (
                <Fragment key={i}>
                  <button onClick={() => load(arr.slice(0, i+1).join('/'))} className="text-[10px] font-black uppercase hover:text-[#0e75d7]">{p}</button>
                  {i < arr.length - 1 && <ChevronRight size={12} className="opacity-20" />}
                </Fragment>
              ))}
            </div>
          </div>

          <div className="bg-white dark:bg-[#161b22] rounded-[2.5rem] border dark:border-gray-800 shadow-2xl overflow-hidden">
            <div className="p-6 border-b dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/20">
               <div className="relative">
                 <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" size={16}/>
                 <input className="w-full pl-12 pr-4 py-3 rounded-2xl bg-white dark:bg-[#0d1117] dark:text-white text-sm outline-none border-none" placeholder="Filtrar por data, ano ou nome..." value={filter} onChange={e => setFilter(e.target.value)} />
               </div>
            </div>
            {loading ? <div className="p-32 text-center text-gray-400 font-black animate-pulse">CARREGANDO...</div> : (
              <div className="divide-y dark:divide-gray-800 max-h-[600px] overflow-y-auto custom-scroll">
                {filtered.map((it, i) => (
                  <div key={i} className="p-5 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-800/50 cursor-pointer group" onClick={() => it.IsDirectory && load(`${path}/${it.ObjectName}`)}>
                    <div className="flex items-center gap-4">
                      <div className={`p-4 rounded-2xl ${it.IsDirectory ? 'bg-blue-50 dark:bg-blue-900/20 text-[#0e75d7]' : 'bg-gray-100 dark:bg-gray-800 text-gray-500'}`}>
                        {it.IsDirectory ? <Folder size={22}/> : <FileText size={22}/>}
                      </div>
                      <div>
                        <p className="font-extrabold text-sm uppercase dark:text-gray-200 group-hover:text-[#0e75d7]">{it.ObjectName}</p>
                        {!it.IsDirectory && <p className="text-[9px] font-bold text-gray-400 uppercase">PDF • {(it.Length/1024).toFixed(1)} KB</p>}
                      </div>
                    </div>
                    {!it.IsDirectory && (
                      <div className="flex gap-2">
                        <button onClick={(e) => { e.stopPropagation(); window.open(`${PUBLIC_CDN}/${path}/${it.ObjectName}`, '_blank'); }} className="p-3 bg-gray-50 dark:bg-gray-800 text-gray-500 rounded-xl hover:text-[#0e75d7]"><Eye size={18}/></button>
                        <button onClick={(e) => { e.stopPropagation(); download(it.ObjectName, path, user); }} className="p-3 bg-blue-50 dark:bg-blue-900/20 text-[#0e75d7] rounded-xl hover:bg-[#0e75d7] hover:text-white"><Download size={18}/></button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function UploadTab({ user }) {
      const [files, setFiles] = useState([]);
      const [target, setTarget] = useState('Fprodutos');
      const [progress, setProgress] = useState({}); // { index: status }
      const [uploading, setUploading] = useState(false);

      const startUpload = async () => {
        if (!files.length) return;
        setUploading(true);
        for (let i = 0; i < files.length; i++) {
          setProgress(prev => ({ ...prev, [i]: 'loading' }));
          const form = new FormData();
          form.append('file', files[i]);
          form.append('path', `${target}/${files[i].name}`);
          try {
            const res = await fetch(`${API_BASE}/upload`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${user.token}` },
              body: form
            });
            setProgress(prev => ({ ...prev, [i]: res.ok ? 'done' : 'error' }));
          } catch (e) { setProgress(prev => ({ ...prev, [i]: 'error' })); }
          await new Promise(r => setTimeout(r, 400));
        }
        setUploading(false);
      };

      return (
        <div className="max-w-2xl mx-auto space-y-6 animate-in slide-in-from-bottom-5 duration-500">
          <div className="bg-white dark:bg-[#161b22] p-8 sm:p-12 rounded-[3rem] shadow-2xl border dark:border-gray-800">
            <div className="flex items-center gap-5 mb-10">
              <div className="p-5 bg-blue-50 dark:bg-blue-900/20 text-[#0e75d7] rounded-[1.5rem]">
                 <Upload size={32}/>
              </div>
              <div>
                 <h2 className="text-2xl font-black uppercase tracking-tighter">Central de Envio</h2>
                 <p className="text-gray-400 text-[10px] font-black uppercase">Múltiplos arquivos suportados</p>
              </div>
            </div>

            <div className="space-y-6">
              <div>
                <label className="text-[10px] font-black uppercase text-gray-400 ml-1 block mb-2 tracking-widest">Pasta de Destino</label>
                <select className="w-full p-5 rounded-2xl bg-gray-100 dark:bg-[#0d1117] dark:text-white border-none outline-none font-bold text-sm focus:ring-2 focus:ring-[#0e75d7]" value={target} onChange={e => setTarget(e.target.value)}>
                  <option value="Fprodutos">Fotos de Produtos</option>
                  <option value="VideosProdutos/Videos YT">Videos Youtube</option>
                  <option value="VideosProdutos/Videos ML">Videos Mercado Livre</option>
                </select>
              </div>

              <div className="border-4 border-dashed dark:border-gray-800 p-12 rounded-[2.5rem] text-center hover:border-[#0e75d7] transition-all cursor-pointer relative group bg-gray-50/50 dark:bg-gray-800/10">
                <input type="file" multiple className="absolute inset-0 opacity-0 cursor-pointer" onChange={e => setFiles(Array.from(e.target.files))} />
                {files.length > 0 ? (
                  <div className="flex flex-col items-center">
                    <Files className="text-[#0e75d7] mb-3" size={48} />
                    <p className="font-black text-sm uppercase">{files.length} arquivo(s) selecionado(s)</p>
                  </div>
                ) : (
                  <div className="opacity-30 group-hover:opacity-100">
                    <Image className="mx-auto mb-4" size={56} />
                    <p className="font-black text-xs uppercase tracking-widest">Arraste ou clique para selecionar</p>
                  </div>
                )}
              </div>

              {files.length > 0 && (
                <div className="space-y-3 bg-gray-50 dark:bg-[#0d1117] p-6 rounded-[2rem] max-h-[300px] overflow-y-auto custom-scroll">
                  {uploading && <p className="text-orange-500 font-black text-[10px] uppercase mb-4 animate-pulse">Não saia desta página até concluir!</p>}
                  {files.map((f, i) => (
                    <div key={i} className="space-y-1">
                      <div className="flex justify-between text-[9px] font-black uppercase">
                        <span className="truncate max-w-[70%]">{f.name}</span>
                        <span className={progress[i] === 'done' ? 'text-green-500' : progress[i] === 'error' ? 'text-red-500' : 'text-[#0e75d7]'}>
                          {progress[i] === 'loading' ? 'Enviando...' : progress[i] === 'done' ? 'Sucesso' : progress[i] === 'error' ? 'Falhou' : 'Pendente'}
                        </span>
                      </div>
                      <div className="h-1.5 w-full bg-gray-200 dark:bg-gray-800 rounded-full overflow-hidden">
                        <div className={`h-full transition-all duration-500 ${progress[i] === 'done' ? 'bg-green-500' : progress[i] === 'error' ? 'bg-red-500' : progress[i] === 'loading' ? 'bg-[#0e75d7] w-1/2' : 'w-0'}`} style={{ width: progress[i] === 'done' ? '100%' : progress[i] === 'loading' ? '60%' : '0%' }} />
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <button disabled={!files.length || uploading} onClick={startUpload} className="w-full bg-[#0e75d7] hover:bg-[#0c64b8] text-white font-black py-5 rounded-3xl transition shadow-xl shadow-blue-600/10 disabled:opacity-20 active:scale-95 uppercase tracking-widest text-sm">
                {uploading ? 'ENVIANDO...' : 'INICIAR UPLOAD'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // HELPER: Download
    async function download(name, path, user) {
      try {
        const res = await fetch(`${API_BASE}/download?path=${encodeURIComponent(path + '/' + name)}`, {
          headers: { 'Authorization': `Bearer ${user.token}` }
        });
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
      } catch (e) { alert("Download falhou."); }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
