<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Interno - Lojas Alvorada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: #f9fafb; }
    .dark body { background: #0d1117; color: white; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #E30613; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="dark">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- ÍCONES SVG (Para evitar erros de bibliotecas externas) ---
    const IconSearch = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconFolder = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>;
    const IconUpload = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
    const IconLogOut = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
    const IconDownload = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;

    // --- CONFIGURAÇÃO ---
    const API_BASE = 'https://bunny-proxy.onrender.com/api'; 
    const PUBLIC_CDN = 'https://lojasalvorada.b-cdn.net';

    function App() {
      const [user, setUser] = useState(null);
      const [tab, setTab] = useState('search');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      
      // Login
      const [captcha, setCaptcha] = useState({ q: '', a: 0 });
      const [form, setForm] = useState({ user: '', pass: '', cap: '' });

      useEffect(() => {
        const session = localStorage.getItem('alvorada_v5');
        if (session) setUser(JSON.parse(session));
        genCaptcha();
      }, []);

      const genCaptcha = () => {
        const n1 = Math.floor(Math.random() * 9) + 1;
        const n2 = Math.floor(Math.random() * 9) + 1;
        setCaptcha({ q: `${n1} + ${n2}`, a: n1 + n2 });
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        if (parseInt(form.cap) !== captcha.a) {
          setError('Soma incorreta.');
          genCaptcha();
          return;
        }
        setLoading(true);
        setError('');
        try {
          const res = await fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: form.user, password: form.pass })
          });
          const data = await res.json();
          if (res.ok) {
            setUser(data);
            localStorage.setItem('alvorada_v5', JSON.stringify(data));
          } else {
            setError(data.error);
            genCaptcha();
          }
        } catch (err) {
          setError('Erro ao conectar ao Render. Verifique se o servidor está ativo.');
        } finally {
          setLoading(false);
        }
      };

      if (!user) {
        return (
          <div className="min-h-screen bg-gray-900 flex items-center justify-center p-4">
            <div className="w-full max-w-md bg-[#161b22] p-10 rounded-[2rem] shadow-2xl border border-gray-800">
              <div className="text-center mb-8">
                <img src="https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png" className="h-12 mx-auto mb-4" />
                <h1 className="text-white text-xl font-bold uppercase tracking-widest">Painel de Acesso</h1>
              </div>
              <form onSubmit={handleLogin} className="space-y-4">
                <input type="text" placeholder="Usuário" className="w-full p-4 rounded-2xl bg-[#0d1117] text-white border-none outline-none focus:ring-2 focus:ring-red-600" value={form.user} onChange={e => setForm({...form, user: e.target.value})} required />
                <input type="password" placeholder="Senha" className="w-full p-4 rounded-2xl bg-[#0d1117] text-white border-none outline-none focus:ring-2 focus:ring-red-600" value={form.pass} onChange={e => setForm({...form, pass: e.target.value})} required />
                <div className="flex items-center gap-3 bg-red-900/10 p-4 rounded-2xl border border-red-900/30">
                  <span className="font-bold text-red-500">{captcha.q} =</span>
                  <input type="number" placeholder="?" className="bg-transparent border-none outline-none w-full text-white font-bold" value={form.cap} onChange={e => setForm({...form, cap: e.target.value})} required />
                </div>
                {error && <p className="text-red-500 text-xs font-bold text-center">{error}</p>}
                <button disabled={loading} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-red-600/20">
                  {loading ? 'A verificar...' : 'ENTRAR'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col bg-[#0d1117] text-white">
          <header className="bg-[#161b22] border-b border-gray-800 px-6 h-20 flex items-center justify-between sticky top-0 z-50">
            <div className="flex items-center gap-6">
              <img src="https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png" className="h-8" />
              <nav className="hidden md:flex gap-2">
                <TabBtn active={tab === 'search'} onClick={() => setTab('search')} icon={<IconSearch/>} label="Consultar" />
                {user.role === 'admin' && <TabBtn active={tab === 'carnes'} onClick={() => setTab('carnes')} icon={<IconFolder/>} label="Carnês" />}
                {['admin', 'editor'].includes(user.role) && <TabBtn active={tab === 'upload'} onClick={() => setTab('upload')} icon={<IconUpload/>} label="Upload" />}
              </nav>
            </div>
            <div className="flex items-center gap-4">
              <span className="text-[10px] font-bold text-gray-400 uppercase">{user.name} ({user.role})</span>
              <button onClick={() => { setUser(null); localStorage.removeItem('alvorada_v5'); }} className="p-3 text-red-500 bg-red-950/20 rounded-xl">
                <IconLogOut />
              </button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto w-full p-6">
            {tab === 'search' && <SearchTab user={user} />}
            {tab === 'carnes' && <CarnesTab user={user} />}
            {tab === 'upload' && <UploadTab user={user} />}
          </main>
        </div>
      );
    }

    // --- COMPONENTES ---

    function TabBtn({ active, onClick, icon, label }) {
      return (
        <button onClick={onClick} className={`flex items-center gap-2 px-4 py-2 rounded-xl font-bold transition ${active ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-gray-800'}`}>
          {icon} <span>{label}</span>
        </button>
      );
    }

    function SearchTab({ user }) {
      const [q, setQ] = useState('');
      const [files, setFiles] = useState([]);
      const [loading, setLoading] = useState(false);

      const search = async () => {
        if (!q) return;
        setLoading(true);
        let all = [];
        const paths = ['Fprodutos', 'VideosProdutos/Videos YT', 'VideosProdutos/Videos ML'];
        try {
          for (const p of paths) {
            const res = await fetch(`${API_BASE}/list?path=${encodeURIComponent(p)}`, {
              headers: { 'Authorization': `Bearer ${user.token}` }
            });
            const data = await res.json();
            if (Array.isArray(data)) {
              const matches = data.filter(f => f.ObjectName.toLowerCase().includes(q.toLowerCase()));
              all = [...all, ...matches.map(f => ({ ...f, fullPath: `${p}/${f.ObjectName}` }))];
            }
          }
          setFiles(all);
        } catch (e) { console.error(e); }
        setLoading(false);
      };

      return (
        <div className="space-y-6">
          <div className="flex gap-4 bg-[#161b22] p-4 rounded-2xl border border-gray-800">
            <input className="flex-grow bg-[#0d1117] p-4 rounded-xl border-none outline-none text-white" placeholder="SKU ou nome do produto..." value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key === 'Enter' && search()} />
            <button onClick={search} className="bg-red-600 px-8 py-4 rounded-xl font-bold">BUSCAR</button>
          </div>
          {loading && <div className="text-center py-10"><div className="loader mx-auto"></div></div>}
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            {files.map((f, i) => (
              <div key={i} className="bg-[#161b22] rounded-2xl p-2 border border-gray-800 hover:border-red-600 transition group relative">
                <div className="aspect-square bg-black rounded-xl overflow-hidden mb-2">
                  <img src={`${PUBLIC_CDN}/${f.fullPath}`} className="w-full h-full object-cover" loading="lazy" />
                </div>
                <p className="text-[10px] truncate font-bold px-1 uppercase">{f.ObjectName}</p>
                <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                  <button onClick={() => downloadFile(f.fullPath, user)} className="bg-white text-black p-3 rounded-full"><IconDownload/></button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CarnesTab({ user }) {
      const [path, setPath] = useState('Carnes');
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(false);

      const load = async (p) => {
        setLoading(true);
        try {
          const res = await fetch(`${API_BASE}/list?path=${encodeURIComponent(p)}`, {
            headers: { 'Authorization': `Bearer ${user.token}` }
          });
          const data = await res.json();
          setItems(Array.isArray(data) ? data : []);
          setPath(p);
        } catch (e) { console.error(e); }
        setLoading(false);
      };

      useEffect(() => { load('Carnes'); }, []);

      return (
        <div className="bg-[#161b22] rounded-2xl border border-gray-800 overflow-hidden">
          <div className="p-4 bg-gray-800/50 text-xs font-bold uppercase tracking-widest text-gray-400">
            {path.split('/').join(' > ')}
          </div>
          {loading ? <div className="p-20 text-center"><div className="loader mx-auto"></div></div> : (
            <div className="divide-y divide-gray-800">
              {items.map((it, i) => (
                <div key={i} className="p-4 flex items-center justify-between hover:bg-gray-800 cursor-pointer transition" onClick={() => it.IsDirectory && load(`${path}/${it.ObjectName}`)}>
                  <div className="flex items-center gap-3">
                    <IconFolder /> <span className="font-bold text-sm">{it.ObjectName}</span>
                  </div>
                  {!it.IsDirectory && <button onClick={(e) => { e.stopPropagation(); downloadFile(`${path}/${it.ObjectName}`, user); }} className="p-2 bg-red-600 rounded-lg"><IconDownload/></button>}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function UploadTab({ user }) {
      const [file, setFile] = useState(null);
      const [target, setTarget] = useState('Fprodutos');
      const [up, setUp] = useState(false);
      const [msg, setMsg] = useState('');

      const handleUp = async (e) => {
        e.preventDefault();
        if (!file) return;
        setUp(true);
        const form = new FormData();
        form.append('file', file);
        form.append('path', `${target}/${file.name}`);
        try {
          const res = await fetch(`${API_BASE}/upload`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${user.token}` },
            body: form
          });
          if (res.ok) { setMsg('Sucesso!'); setFile(null); }
          else setMsg('Erro no upload.');
        } catch (e) { setMsg('Erro de rede.'); }
        setUp(false);
      };

      return (
        <div className="max-w-xl mx-auto bg-[#161b22] p-8 rounded-3xl border border-gray-800">
          <h2 className="text-xl font-bold mb-6">Enviar para Bunny.net</h2>
          <form onSubmit={handleUp} className="space-y-6">
            <select className="w-full p-4 bg-[#0d1117] rounded-xl border-none text-white font-bold" value={target} onChange={e => setTarget(e.target.value)}>
              <option value="Fprodutos">Fprodutos</option>
              <option value="VideosProdutos/Videos YT">Vídeos YT</option>
              <option value="VideosProdutos/Videos ML">Vídeos ML</option>
            </select>
            <input type="file" className="w-full bg-[#0d1117] p-8 rounded-xl border-2 border-dashed border-gray-800 text-center" onChange={e => setFile(e.target.files[0])} />
            {msg && <p className="text-center font-bold text-red-500">{msg}</p>}
            <button disabled={!file || up} className="w-full bg-red-600 p-4 rounded-xl font-bold">
              {up ? 'A ENVIAR...' : 'INICIAR UPLOAD'}
            </button>
          </form>
        </div>
      );
    }

    async function downloadFile(path, user) {
      try {
        const res = await fetch(`${API_BASE}/download?path=${encodeURIComponent(path)}`, {
          headers: { 'Authorization': `Bearer ${user.token}` }
        });
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = path.split('/').pop();
        a.click();
      } catch (e) { alert("Download falhou."); }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
