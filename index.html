<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Interno - Lojas Alvorada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            alvorada: '#0e75d7',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; margin: 0; }
    .dark { background-color: #0b0e14; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #0e75d7; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #0e75d7; border-radius: 10px; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .no-select { user-select: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    {
      const { useState, useEffect, useMemo, Fragment } = React;

      // --- ÍCONES SVG INTERNOS ---
      const Icons = {
        Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
        Upload: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
        FileText: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>,
        LogOut: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
        Moon: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>,
        Sun: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>,
        Download: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
        Folder: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#eab308" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>,
        ChevronRight: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>,
        Grid: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>,
        List: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>,
        Eye: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
        EyeOff: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>,
        Info: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
        Layers: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>,
        VideoVertical: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="7" y="2" width="10" height="20" rx="2"></rect></svg>,
        VideoHorizontal: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="2" y="7" width="20" height="10" rx="2"></rect></svg>,
        Share: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
      };

      const API_BASE = 'https://bunny-proxy.onrender.com/api'; 
      const PUBLIC_CDN = 'https://lojasalvorada.b-cdn.net';

      // --- GERENCIADOR DE CACHE GLOBAL (MUITO MAIS RÁPIDO) ---
      const CACHE_EXPIRY = 30 * 60 * 1000; // 30 minutos
      const memoryCache = {}; // Cache direto na memória RAM (Impede o congelamento da tela em pesquisas repetidas)

      const fetchWithCache = async (url, token) => {
        const cacheKey = `alv_api_${url}`;
        
        // 1. Tentativa na Memória RAM (Acesso instantâneo de 0ms)
        if (memoryCache[cacheKey] && (Date.now() - memoryCache[cacheKey].timestamp < CACHE_EXPIRY)) {
          return memoryCache[cacheKey].data;
        }

        // 2. Tentativa no LocalStorage (Preserva as buscas se o usuário fechar/atualizar a aba)
        const cached = localStorage.getItem(cacheKey);
        if (cached) {
          try {
            const { data, timestamp } = JSON.parse(cached);
            if (Date.now() - timestamp < CACHE_EXPIRY) {
              memoryCache[cacheKey] = { data, timestamp }; // Registra na RAM também
              return data;
            }
          } catch(e) {}
        }
        
        // 3. Busca Nova (Internet/Bunny)
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        
        if (Array.isArray(data)) {
          const cacheData = { data, timestamp: Date.now() };
          memoryCache[cacheKey] = cacheData;
          try {
            localStorage.setItem(cacheKey, JSON.stringify(cacheData));
          } catch(e) { localStorage.clear(); } // Se a memória tiver cheia (muitos arquivos), recicla
        }
        return data;
      };

      const clearApiCache = () => {
        Object.keys(memoryCache).forEach(k => delete memoryCache[k]);
        Object.keys(localStorage).forEach(k => {
          if (k.startsWith('alv_api_')) localStorage.removeItem(k);
        });
      };

      // Esta variável preserva os estados quando o usuário troca de abas!
      const globalState = {
        search: { q: '', files: [], page: 1, view: 'grid', filter: 'all', subFilter: 'all', perPage: 15 },
        multi: { q: '', groups: [] },
        carnes: { path: 'Carnes', items: [], filter: '' }
      };

      // --- HELPERS ---
      const formatMB = (bytes) => (bytes / (1024 * 1024)).toFixed(2);
      
      const downloadFile = async (name, path, token) => {
        try {
          const res = await fetch(`${API_BASE}/download?path=${encodeURIComponent(path + '/' + name)}`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = name;
          document.body.appendChild(a); a.click(); a.remove();
          window.URL.revokeObjectURL(url);
        } catch (e) { console.error("Download falhou"); }
      };

      // --- COMPONENTE PRINCIPAL ---
      function App() {
        const [user, setUser] = useState(null);
        const [tab, setTab] = useState('search');
        const [darkMode, setDarkMode] = useState(() => localStorage.getItem('alvorada_theme') !== 'light');

        useEffect(() => {
          const session = localStorage.getItem('alvorada_session');
          if (session) {
            try { setUser(JSON.parse(session)); } catch(e) { localStorage.removeItem('alvorada_session'); }
          }
        }, []);

        useEffect(() => {
          document.documentElement.classList.toggle('dark', darkMode);
          localStorage.setItem('alvorada_theme', darkMode ? 'dark' : 'light');
        }, [darkMode]);

        // PRÉ-CARREGAMENTO SILENCIOSO NO FUNDO
        // Assim que o usuário loga, a lista dos arquivos começa a ser baixada em background.
        useEffect(() => {
          if (user) {
            const paths = ['Fprodutos', 'VideosProdutos/Videos YT', 'VideosProdutos/Videos ML'];
            paths.forEach(p => fetchWithCache(`${API_BASE}/list?path=${encodeURIComponent(p)}`, user.token).catch(()=>{}));
          }
        }, [user]);

        if (!user) return <LoginScreen onLogin={(u) => setUser(u)} darkMode={darkMode} />;

        return (
          <div className="min-h-screen flex flex-col transition-colors duration-300 bg-gray-50 dark:bg-[#0b0e14] text-gray-900 dark:text-gray-100">
            <header className="bg-white dark:bg-[#161b22] border-b border-gray-200 dark:border-gray-800 h-20 flex items-center justify-between px-4 lg:px-8 sticky top-0 z-50 shadow-sm transition-colors">
              <div className="flex items-center gap-4 lg:gap-10">
                <img src={darkMode ? "https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png" : "https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/MARCA%20COLORIDA.png"} className="h-8 lg:h-10 object-contain" />
                <nav className="hidden lg:flex gap-2">
                  <TabBtn active={tab === 'search' || tab === 'multiSearch'} onClick={() => setTab('search')} icon={<Icons.Search />} label="Produtos" />
                  {user.role === 'admin' && <TabBtn active={tab === 'carnes'} onClick={() => setTab('carnes')} icon={<Icons.FileText />} label="Carnês" />}
                  {['admin', 'editor'].includes(user.role) && <TabBtn active={tab === 'upload'} onClick={() => setTab('upload')} icon={<Icons.Upload />} label="Enviar" />}
                </nav>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => setDarkMode(!darkMode)} className="p-3 bg-gray-100 dark:bg-gray-800 rounded-2xl transition hover:scale-110 active:scale-95 text-[#0e75d7]">
                  {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                </button>
                <button onClick={() => { setUser(null); localStorage.removeItem('alvorada_session'); clearApiCache(); }} className="p-3 text-red-500 bg-red-50 dark:bg-red-950/30 rounded-2xl transition hover:scale-110 active:scale-95">
                  <Icons.LogOut />
                </button>
              </div>
            </header>

            {/* Menu Mobile */}
            <nav className="lg:hidden flex border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-[#161b22] sticky top-20 z-40 overflow-x-auto shadow-sm no-select no-scrollbar transition-colors">
              <button onClick={() => setTab('search')} className={`flex-1 py-4 flex flex-col items-center gap-1 text-[10px] font-black uppercase transition-all min-w-[80px] ${(tab === 'search' || tab === 'multiSearch') ? 'text-[#0e75d7] border-b-2 border-[#0e75d7]' : 'text-gray-400'}`}>
                <Icons.Search /> <span>Busca</span>
              </button>
              {user.role === 'admin' && (
                <button onClick={() => setTab('carnes')} className={`flex-1 py-4 flex flex-col items-center gap-1 text-[10px] font-black uppercase transition-all min-w-[80px] ${tab === 'carnes' ? 'text-[#0e75d7] border-b-2 border-[#0e75d7]' : 'text-gray-400'}`}>
                  <Icons.FileText /> <span>Carnês</span>
                </button>
              )}
              {['admin', 'editor'].includes(user.role) && (
                <button onClick={() => setTab('upload')} className={`flex-1 py-4 flex flex-col items-center gap-1 text-[10px] font-black uppercase transition-all min-w-[80px] ${tab === 'upload' ? 'text-[#0e75d7] border-b-2 border-[#0e75d7]' : 'text-gray-400'}`}>
                  <Icons.Upload /> <span>Enviar</span>
                </button>
              )}
            </nav>

            <main className="flex-grow max-w-7xl mx-auto w-full p-4 lg:p-8 fade-in">
              {tab === 'search' && <SearchTab user={user} onMultiSearch={() => setTab('multiSearch')} />}
              {tab === 'multiSearch' && <MultiSearchTab user={user} onBack={() => setTab('search')} />}
              {tab === 'carnes' && <CarnesTab user={user} />}
              {tab === 'upload' && <UploadTab user={user} />}
            </main>
            
            <footer className="p-6 text-center text-[10px] font-black uppercase text-gray-400 bg-white dark:bg-[#161b22] border-t border-gray-200 dark:border-gray-800 transition-colors">
              Perfect Comércio de Confecções Ltda &copy; {new Date().getFullYear()} • Sarandi-PR
            </footer>
          </div>
        );
      }

      function TabBtn({ active, onClick, icon, label }) {
        return (
          <button onClick={onClick} className={`flex items-center gap-2 px-5 py-2.5 rounded-2xl font-bold transition-all ${active ? 'bg-blue-50 text-[#0e75d7] dark:bg-blue-900/20 shadow-sm' : 'text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
            {icon} <span className="uppercase text-xs tracking-tighter">{label}</span>
          </button>
        );
      }

      // --- TELA DE LOGIN ---
      function LoginScreen({ onLogin, darkMode }) {
        const [form, setForm] = useState({ u: '', p: '', c: '' });
        const [captcha, setCaptcha] = useState({ q: '', a: 0 });
        const [showPass, setShowPass] = useState(false);
        const [error, setError] = useState('');
        const [loading, setLoading] = useState(false);

        const genCap = () => {
          const n1 = Math.floor(Math.random() * 9) + 1;
          const n2 = Math.floor(Math.random() * 9) + 1;
          setCaptcha({ q: `${n1} + ${n2}`, a: n1 + n2 });
        };
        useEffect(() => { genCap(); }, []);

        const submit = async (e) => {
          e.preventDefault();
          if (parseInt(form.c) !== captcha.a) { setError('A soma está errada. Tente novamente.'); genCap(); return; }
          setLoading(true); setError('');
          try {
            const res = await fetch(`${API_BASE}/login`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: form.u, password: form.p })
            });
            const data = await res.json();
            if (res.ok) {
              onLogin(data);
              localStorage.setItem('alvorada_session', JSON.stringify(data));
            } else { setError(data.error || 'Acesso negado'); genCap(); }
          } catch (err) { setError('Servidor offline'); }
          setLoading(false);
        };

        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-gray-100 dark:bg-[#0b0e14] transition-colors duration-300">
            <div className="w-full max-w-md bg-white dark:bg-[#161b22] p-8 rounded-[2.5rem] shadow-2xl border border-gray-200 dark:border-gray-800 fade-in">
              <div className="text-center mb-8">
                <img src={darkMode ? "https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/LOGO%20BRANCA%20COM%20ESCRITA.png" : "https://lojasalvorada.b-cdn.net/Logos%20Loja/PNG/MARCA%20COLORIDA.png"} className="h-14 mx-auto mb-4 object-contain transition-all" />
                <h1 className="text-2xl font-black dark:text-white uppercase tracking-tighter">Painel Interno</h1>
              </div>
              <form onSubmit={submit} className="space-y-4">
                <input type="text" placeholder="Utilizador" className="w-full p-4 rounded-2xl bg-gray-50 dark:bg-[#0d1117] dark:text-white border border-gray-200 dark:border-gray-800 outline-none focus:ring-2 focus:ring-[#0e75d7] transition-all" value={form.u} onChange={e => setForm({...form, u: e.target.value})} required />
                <div className="relative">
                  <input type={showPass ? "text" : "password"} placeholder="Senha"  className="w-full p-4 rounded-2xl bg-gray-100 dark:bg-[#0d1117] dark:text-white border border-gray-200 dark:border-gray-800 outline-none focus:ring-2 focus:ring-[#0e75d7] transition-all" value={form.p} onChange={e => setForm({...form, p: e.target.value})} required />
                  <button type="button" onClick={() => setShowPass(!showPass)} className="absolute right-4 top-4 text-gray-400 hover:text-[#0e75d7]">
                    {showPass ? <Icons.EyeOff /> : <Icons.Eye />}
                  </button>
                </div>
                <div className="bg-blue-50 dark:bg-blue-900/10 p-5 rounded-2xl border border-blue-100 dark:border-blue-900/30 transition-colors">
                  <p className="text-[10px] font-bold text-blue-600 dark:text-blue-400 mb-2 uppercase">Resolva essa conta para provar que não é um robô:</p>
                  <div className="flex items-center gap-3">
                    <span className="font-black text-xl text-[#0e75d7] no-select">{captcha.q} =</span>
                    <input type="number" placeholder="sua resposta aqui" className="w-full p-2 rounded-xl bg-white dark:bg-gray-800 dark:text-white border-2 border-blue-100 dark:border-blue-800 text-center font-bold focus:border-[#0e75d7] outline-none shadow-inner transition-all" value={form.c} onChange={e => setForm({...form, c: e.target.value})} required />
                  </div>
                </div>
                {error && <p className="text-red-500 text-xs font-bold text-center bg-red-50 dark:bg-red-950/50 p-2 rounded-lg">{error}</p>}
                <button disabled={loading} className="w-full bg-[#0e75d7] hover:bg-[#0c64b8] text-white font-black py-4 rounded-2xl transition shadow-xl shadow-blue-600/20 active:scale-95">
                  {loading ? 'CARREGANDO...' : 'ENTRAR NO SISTEMA'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      // --- TAB PESQUISA NORMAL ---
      function SearchTab({ user, onMultiSearch }) {
        const [q, setQ] = useState(globalState.search.q);
        const [files, setFiles] = useState(globalState.search.files);
        const [page, setPage] = useState(globalState.search.page);
        const [view, setView] = useState(globalState.search.view);
        const [filter, setFilter] = useState(globalState.search.filter); 
        const [subFilter, setSubFilter] = useState(globalState.search.subFilter);
        const [perPage, setPerPage] = useState(globalState.search.perPage);
        const [loading, setLoading] = useState(false);

        // Sincroniza com a memória global a cada alteração
        useEffect(() => {
          globalState.search = { q, files, page, view, filter, subFilter, perPage };
        }, [q, files, page, view, filter, subFilter, perPage]);

        const handleFilterChange = (f) => {
          setFilter(f);
          setSubFilter('all'); 
          setPage(1);
        };

        const handleSubFilterChange = (sf) => {
          setSubFilter(sf);
          setPage(1);
        };

        const handlePerPageChange = (e) => {
          setPerPage(Number(e.target.value));
          setPage(1);
        };

        const performSearch = async () => {
          if (!q) return;
          setLoading(true);
          let all = [];
          const paths = ['Fprodutos', 'VideosProdutos/Videos YT', 'VideosProdutos/Videos ML'];
          try {
            // PROMISE.ALL: Dispara a busca nas 3 pastas ao MESMO TEMPO (Paralelo)
            const fetchPromises = paths.map(async (p) => {
               const data = await fetchWithCache(`${API_BASE}/list?path=${encodeURIComponent(p)}`, user.token);
               return { path: p, data };
            });
            const results = await Promise.all(fetchPromises);

            results.forEach(({ path, data }) => {
              if (Array.isArray(data)) {
                const matches = data.filter(f => f.ObjectName && f.ObjectName.toLowerCase().includes(q.toLowerCase()));
                all = [...all, ...matches.map(f => ({ ...f, fullPath: `${path}/${f.ObjectName}` }))];
              }
            });

            setFiles(all || []);
            setPage(1);
          } catch (e) { console.error("Busca falhou"); }
          setLoading(false);
        };

        const filtered = useMemo(() => {
          if (!Array.isArray(files)) return [];
          return files.filter(f => {
            const ext = (f.ObjectName || '').split('.').pop().toLowerCase();
            const isImg = ['jpg','jpeg','png','webp','gif'].includes(ext);
            const isVid = ['mp4','mov','webm'].includes(ext);
            
            if (filter === 'image') return isImg;
            if (filter === 'video') {
                if (!isVid) return false;
                if (subFilter === 'vertical') return f.fullPath?.includes('Videos ML');
                if (subFilter === 'horizontal') return f.fullPath?.includes('Videos YT');
                return true;
            }
            return true;
          });
        }, [files, filter, subFilter]);

        const paginated = filtered.slice((page - 1) * perPage, page * perPage);

        const downloadAll = async () => {
          if (!filtered.length || !confirm(`Baixar os ${filtered.length} arquivos encontrados?`)) return;
          for (const f of filtered) {
            await downloadFile(f.ObjectName, f.fullPath.split('/').slice(0,-1).join('/'), user.token);
            await new Promise(r => setTimeout(r, 600));
          }
        };

        return (
          <div className="space-y-6 fade-in">
            <div className="bg-white dark:bg-[#161b22] p-6 rounded-[2.5rem] shadow-xl border border-gray-100 dark:border-gray-800 space-y-4 transition-all">
              <div className="flex justify-between items-center mb-1">
                 <span className="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-2">Consulta Individual</span>
                 <button onClick={onMultiSearch} className="text-[#0e75d7] font-black text-[10px] uppercase flex items-center gap-2 hover:bg-[#0e75d7] hover:text-white transition-all bg-blue-50 dark:bg-blue-900/20 px-4 py-2 rounded-xl shadow-sm">
                   <Icons.Layers /> Múltiplos Códigos
                 </button>
              </div>

              <div className="flex flex-col md:flex-row gap-3">
                <div className="flex-grow relative text-[#0e75d7]">
                  <div className="absolute left-5 top-1/2 -translate-y-1/2 opacity-50"><Icons.Search /></div>
                  <input className="w-full pl-14 pr-4 py-4 rounded-2xl bg-gray-50 dark:bg-[#0d1117] dark:text-white border-none outline-none focus:ring-2 focus:ring-[#0e75d7] transition-all" placeholder="SKU ou nome do produto..." value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key === 'Enter' && performSearch()} />
                </div>
                <button onClick={performSearch} className="bg-[#0e75d7] text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-blue-600/20 active:scale-95 transition-all uppercase text-xs tracking-widest">BUSCAR</button>
              </div>
              
              <div className="flex flex-wrap justify-between items-center gap-4 pt-4 border-t border-gray-100 dark:border-gray-800 transition-colors">
                <div className="flex flex-col sm:flex-row flex-wrap gap-3">
                  <div className="flex gap-2 bg-gray-100 dark:bg-gray-800 p-1 rounded-xl">
                    {['all', 'image', 'video'].map(f => (
                      <button key={f} onClick={() => handleFilterChange(f)} className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all ${filter === f ? 'bg-white dark:bg-gray-700 text-[#0e75d7] shadow-sm' : 'text-gray-400'}`}>
                        {f === 'all' ? 'Todos' : f === 'image' ? 'Imagens' : 'Vídeos'}
                      </button>
                    ))}
                  </div>

                  {filter === 'video' && (
                    <div className="flex gap-2 bg-blue-50 dark:bg-blue-900/20 p-1 rounded-xl fade-in border border-blue-100 dark:border-blue-800/50">
                      {['all', 'vertical', 'horizontal'].map(sf => (
                        <button key={sf} onClick={() => handleSubFilterChange(sf)} className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all ${subFilter === sf ? 'bg-[#0e75d7] text-white shadow-sm' : 'text-[#0e75d7] hover:bg-[#0e75d7]/10'}`}>
                          {sf === 'all' ? 'Ambos' : sf === 'vertical' ? 'Vertical (ML)' : 'Horizontal (YT)'}
                        </button>
                      ))}
                    </div>
                  )}
                </div>

                <div className="flex flex-wrap items-center gap-3">
                  <select value={perPage} onChange={handlePerPageChange} className="bg-gray-100 dark:bg-gray-800 text-[#0e75d7] font-black text-[10px] uppercase rounded-lg px-3 py-2 outline-none cursor-pointer border-r-8 border-transparent">
                    {[15, 20, 25, 30, 35, 40, 45, 50].map(n => <option key={n} value={n}>{n} por pág</option>)}
                  </select>

                  <div className="flex gap-1 bg-gray-100 dark:bg-gray-800 p-1 rounded-xl text-[#0e75d7]">
                    <button onClick={() => setView('grid')} className={`p-2 rounded-lg transition-all ${view === 'grid' ? 'bg-white dark:bg-gray-700 shadow-sm' : 'text-gray-400'}`}><Icons.Grid /></button>
                    <button onClick={() => setView('list')} className={`p-2 rounded-lg transition-all ${view === 'list' ? 'bg-white dark:bg-gray-700 shadow-sm' : 'text-gray-400'}`}><Icons.List /></button>
                  </div>
                  {filtered.length > 0 && <button onClick={downloadAll} className="text-[#0e75d7] font-black text-[10px] uppercase flex items-center gap-1 hover:underline transition-all"><Icons.Download /> Baixar Tudo</button>}
                </div>
              </div>
            </div>

            {loading ? <div className="p-20 text-center animate-pulse text-[#0e75d7] font-black tracking-widest uppercase">PROCURANDO...</div> : (
              <>
                <div key={`${page}-${view}-${filter}-${subFilter}-${perPage}`} className={`fade-in ${view === 'grid' ? "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" : "space-y-2"}`}>
                  {paginated.map((f, i) => <FileCard key={i} file={f} view={view} user={user} />)}
                </div>

                {filtered.length > perPage && (
                  <div className="flex justify-center items-center gap-6 mt-12 bg-white dark:bg-[#161b22] p-4 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-lg w-fit mx-auto transition-all">
                    <button disabled={page === 1} onClick={() => { setPage(p => p - 1); window.scrollTo({top:0, behavior: 'smooth'}); }} className="font-bold disabled:opacity-20 px-4 py-2 hover:text-[#0e75d7] transition-all uppercase text-xs">Anterior</button>
                    <span className="text-xs font-black text-gray-400 uppercase tracking-widest">Página {page} de {Math.ceil(filtered.length / perPage)}</span>
                    <button disabled={page >= Math.ceil(filtered.length / perPage)} onClick={() => { setPage(p => p + 1); window.scrollTo({top:0, behavior: 'smooth'}); }} className="font-bold disabled:opacity-20 px-4 py-2 hover:text-[#0e75d7] transition-all uppercase text-xs">Próxima</button>
                  </div>
                )}
              </>
            )}
          </div>
        );
      }

      // --- TAB BUSCA MULTIPLA ---
      function MultiSearchTab({ user, onBack }) {
        const [q, setQ] = useState(globalState.multi.q);
        const [groups, setGroups] = useState(globalState.multi.groups);
        const [loading, setLoading] = useState(false);

        useEffect(() => {
          globalState.multi = { q, groups };
        }, [q, groups]);

        const performMultiSearch = async () => {
          if (!q.trim()) return;
          setLoading(true);
          
          const skus = q.trim().split(/\s+/).filter(s => s.trim().length > 0);
          let all = [];
          const paths = ['Fprodutos', 'VideosProdutos/Videos YT', 'VideosProdutos/Videos ML'];
          
          try {
            // PROMISE.ALL: Dispara a busca nas 3 pastas ao MESMO TEMPO (Paralelo)
            const fetchPromises = paths.map(async (p) => {
               const data = await fetchWithCache(`${API_BASE}/list?path=${encodeURIComponent(p)}`, user.token);
               return { path: p, data };
            });
            const results = await Promise.all(fetchPromises);

            results.forEach(({ path, data }) => {
              if (Array.isArray(data)) {
                all = [...all, ...data.map(f => ({ ...f, fullPath: `${path}/${f.ObjectName}` }))];
              }
            });

            const newGroups = skus.map(sku => {
              const matches = all.filter(f => f.ObjectName && f.ObjectName.toLowerCase().includes(sku.toLowerCase()));
              return { sku, files: matches };
            });
            setGroups(newGroups);
          } catch (e) { console.error("Busca múltipla falhou"); }
          setLoading(false);
        };

        return (
          <div className="space-y-6 fade-in">
            <button onClick={onBack} className="text-gray-400 hover:text-[#0e75d7] font-black text-[10px] uppercase flex items-center gap-1 transition-all ml-2">
               ← Voltar para Busca Normal
            </button>

            <div className="bg-white dark:bg-[#161b22] p-6 lg:p-10 rounded-[2.5rem] shadow-xl border border-gray-100 dark:border-gray-800 space-y-4 transition-all">
              <div className="flex items-center gap-4 mb-2">
                <div className="p-4 bg-blue-50 dark:bg-blue-900/20 text-[#0e75d7] rounded-2xl"><Icons.Layers /></div>
                <div>
                  <h2 className="text-[#0e75d7] font-black uppercase text-xl tracking-tighter">Busca Múltipla</h2>
                  <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">
                    Cole os códigos (SKU) separados por espaço ou quebra de linha
                  </p>
                </div>
              </div>

              <textarea 
                className="w-full p-5 rounded-3xl bg-gray-50 dark:bg-[#0d1117] dark:text-white border border-gray-100 dark:border-gray-800 outline-none focus:ring-2 focus:ring-[#0e75d7] transition-all min-h-[120px] resize-y custom-scroll text-sm font-semibold" 
                placeholder="Exemplo:&#10;119119&#10;109109&#10;118101" 
                value={q} 
                onChange={e => setQ(e.target.value)}
              />
              <div className="flex justify-end pt-2 border-t border-gray-100 dark:border-gray-800">
                 <button onClick={performMultiSearch} disabled={loading} className="bg-[#0e75d7] text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-blue-600/20 active:scale-95 disabled:opacity-50 transition-all uppercase text-xs tracking-widest flex gap-2 items-center">
                   {loading ? 'BUSCANDO...' : <><Icons.Search /> PESQUISAR LISTA</>}
                 </button>
              </div>
            </div>

            {loading ? (
               <div className="p-20 text-center animate-pulse text-[#0e75d7] font-black tracking-widest uppercase">PROCESSANDO TODOS OS CÓDIGOS...</div>
            ) : (
               <div className="space-y-6">
                 {groups.map((g, i) => <SKUGroup key={i} sku={g.sku} files={g.files} user={user} />)}
               </div>
            )}
          </div>
        );
      }

      // COMPONENTE PARA AGRUPAR RESULTADOS DE UM SKU
      function SKUGroup({ sku, files, user }) {
        const [expanded, setExpanded] = useState(false);
        const hasFiles = files.length > 0;
        const firstFile = hasFiles ? files[0] : null;

        const downloadFirst = () => {
          if (firstFile) {
            downloadFile(firstFile.ObjectName, firstFile.fullPath.split('/').slice(0,-1).join('/'), user.token);
          }
        };

        return (
          <div className="bg-white dark:bg-[#161b22] border border-gray-100 dark:border-gray-800 p-6 rounded-[2rem] shadow-sm fade-in transition-all">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
              <div className="flex items-center gap-3">
                <div className={`px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest ${hasFiles ? 'bg-blue-50 text-[#0e75d7] dark:bg-blue-900/30 dark:text-blue-400' : 'bg-red-50 text-red-500 dark:bg-red-900/30'}`}>
                   SKU: {sku}
                </div>
                <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{files.length} arquivo(s)</span>
              </div>
              
              {hasFiles && (
                <div className="flex gap-2 w-full md:w-auto">
                  <button onClick={downloadFirst} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-[#0e75d7] text-white rounded-xl text-[10px] font-black uppercase transition-all hover:bg-[#0c64b8] shadow-lg shadow-blue-600/20 active:scale-95">
                    <Icons.Download /> Baixar Primeira
                  </button>
                  {files.length > 1 && (
                    <button onClick={() => setExpanded(!expanded)} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-xl text-[10px] font-black uppercase transition-all hover:bg-gray-200 dark:hover:bg-gray-700 active:scale-95">
                      <Icons.Grid /> {expanded ? 'Recolher Arquivos' : `Expandir Todas (${files.length})`}
                    </button>
                  )}
                </div>
              )}
            </div>

            {hasFiles && !expanded && (
              <div className="mt-5 flex gap-4 overflow-hidden items-center p-3 bg-gray-50 dark:bg-[#0d1117] rounded-[1.5rem] border border-gray-100 dark:border-gray-800 w-full md:w-max min-w-[300px]">
                <div className="w-16 h-16 flex-shrink-0 relative overflow-hidden rounded-xl">
                   <PreviewThumb file={firstFile} />
                </div>
                <div className="min-w-0 flex-1 pr-4">
                   <p className="text-xs font-black truncate dark:text-gray-200 uppercase tracking-tighter" title={firstFile.ObjectName}>{firstFile.ObjectName}</p>
                   <p className="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">{(firstFile.Length / (1024*1024)).toFixed(2)} MB</p>
                </div>
              </div>
            )}

            {expanded && (
              <div className="mt-6 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 pt-6 border-t border-gray-100 dark:border-gray-800">
                {files.map((f, i) => <FileCard key={i} file={f} view="grid" user={user} />)}
              </div>
            )}

            {!hasFiles && (
              <div className="mt-4 p-5 text-center text-gray-400 text-[10px] font-black uppercase tracking-widest bg-gray-50 dark:bg-[#0d1117] rounded-[1.5rem] border border-gray-100 dark:border-gray-800">
                Nenhum arquivo encontrado para este código.
              </div>
            )}
          </div>
        );
      }

      // HELPER: Thumbnail bem simples sem botões em volta (usado na Busca Múltipla)
      function PreviewThumb({ file }) {
        const ext = (file.ObjectName || '').split('.').pop().toLowerCase();
        const isImg = ['jpg','jpeg','png','webp','gif'].includes(ext);
        const isVid = ['mp4','mov','webm'].includes(ext);
        const url = `${PUBLIC_CDN}/${(file.fullPath || '').split('/').map(encodeURIComponent).join('/')}`;
        
        if (isImg) return <img src={url} className="w-full h-full object-cover shadow-sm" loading="lazy" />;
        if (isVid) return <video src={url} className="w-full h-full object-cover shadow-sm opacity-80" preload="metadata" />;
        return <div className="w-full h-full flex items-center justify-center bg-gray-200 dark:bg-gray-800 text-gray-400"><Icons.FileText /></div>;
      }

      function FileCard({ file, view, user }) {
        const [showDetail, setShowDetail] = useState(false);
        const [isSharing, setIsSharing] = useState(false);
        const ext = (file.ObjectName || '').split('.').pop().toLowerCase();
        const isImg = ['jpg','jpeg','png','webp','gif'].includes(ext);
        const isVid = ['mp4','mov','webm'].includes(ext);
        const url = `${PUBLIC_CDN}/${(file.fullPath || '').split('/').map(encodeURIComponent).join('/')}`;
        const date = file.LastChanged ? new Date(file.LastChanged).toLocaleDateString('pt-BR') : '-';
        const sizeMb = (file.Length / (1024 * 1024)).toFixed(2);

        // Lógica de Detecção de Orientação
        const isVideosML = file.fullPath?.includes('Videos ML');
        const isVideosYT = file.fullPath?.includes('Videos YT');

        // LÓGICA DE COMPARTILHAMENTO NATIVO (WEB SHARE API)
        const handleShare = async (e) => {
          e.stopPropagation();
          if (isSharing) return;
          
          if (!navigator.canShare) {
            alert('Seu navegador não possui suporte para compartilhamento nativo.');
            return;
          }

          setIsSharing(true);
          try {
            // Busca o arquivo real para compartilhar (não o link)
            const response = await fetch(url);
            const blob = await response.blob();
            const fileObj = new File([blob], file.ObjectName, { type: blob.type });

            // Checa se o dispositivo pode compartilhar esse arquivo específico
            if (navigator.canShare({ files: [fileObj] })) {
              await navigator.share({
                title: file.ObjectName,
                files: [fileObj]
              });
            } else {
              alert('Seu dispositivo não suporta compartilhar este tipo de arquivo diretamente.');
            }
          } catch (error) {
            // Cancelado pelo usuário ou erro (ignorar no console)
            console.log('Compartilhamento cancelado/falhou');
          }
          setIsSharing(false);
        };

        // Componente de Thumbnail de Vídeo
        const VideoThumbnail = () => (
          <div className="w-full h-full relative flex items-center justify-center bg-black overflow-hidden group-hover:scale-110 transition duration-700">
            <video 
              src={url} 
              className="w-full h-full object-cover opacity-60"
              preload="metadata"
            />
            {/* Ícone de Play sobreposto */}
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
              <div className="bg-white/20 p-2 rounded-full backdrop-blur-sm shadow-lg">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white" className="ml-1"><path d="M5 3l14 9-14 9V3z"></path></svg>
              </div>
            </div>
            {/* Badge Indicador Vertical/Horizontal */}
            <div className="absolute top-2 left-2 flex items-center gap-1.5 px-2 py-1 bg-black/70 rounded-lg backdrop-blur-md border border-white/20 z-10">
              {isVideosML ? (
                <>
                  <div className="text-white"><Icons.VideoVertical /></div>
                  <span className="text-[8px] font-black uppercase text-white tracking-widest">Vertical</span>
                </>
              ) : (
                <>
                  <div className="text-white"><Icons.VideoHorizontal /></div>
                  <span className="text-[8px] font-black uppercase text-white tracking-widest">Horizontal</span>
                </>
              )}
            </div>
          </div>
        );

        if (view === 'list') {
          return (
            <div className="bg-white dark:bg-[#161b22] p-4 rounded-2xl border border-gray-100 dark:border-gray-800 flex items-center justify-between gap-4 hover:border-[#0e75d7] transition-all group fade-in">
              <div className="flex items-center gap-4 flex-1 min-w-0">
                <div className="w-12 h-12 rounded-lg overflow-hidden bg-black flex-shrink-0 flex items-center justify-center shadow-inner relative">
                  {isImg ? (
                    <img src={url} className="w-full h-full object-cover" />
                  ) : isVid ? (
                    <video src={url} className="w-full h-full object-cover opacity-70" preload="metadata" />
                  ) : (
                    <div className="text-white opacity-40"><Icons.FileText /></div>
                  )}
                </div>
                <div className="min-w-0">
                  <div className="flex items-center gap-2 mb-0.5">
                    <p className="text-xs font-black truncate dark:text-white uppercase tracking-tighter">{file.ObjectName}</p>
                    {isVid && (
                      <div className={`flex items-center gap-1 px-1.5 py-0.5 rounded text-[8px] font-black uppercase flex-shrink-0 ${isVideosML ? 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400' : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'}`}>
                        {isVideosML ? <><Icons.VideoVertical /> ML</> : <><Icons.VideoHorizontal /> YT</>}
                      </div>
                    )}
                  </div>
                  <p className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">{ext} • {sizeMb} MB • {date}</p>
                </div>
              </div>
              <div className="flex gap-2">
                 <button onClick={handleShare} disabled={isSharing} className="p-3 bg-gray-50 dark:bg-gray-800 text-gray-400 hover:text-[#0e75d7] disabled:opacity-50 transition-all rounded-xl flex items-center justify-center">
                    {isSharing ? <div className="w-[18px] h-[18px] rounded-full border-2 border-current border-t-transparent animate-spin"></div> : <Icons.Share />}
                 </button>
                 <button onClick={() => window.open(url, '_blank')} className="p-3 bg-gray-50 dark:bg-gray-800 text-gray-400 hover:text-[#0e75d7] transition-all rounded-xl"><Icons.Eye /></button>
                 <button onClick={() => downloadFile(file.ObjectName, (file.fullPath || '').split('/').slice(0,-1).join('/'), user.token)} className="p-3 bg-[#0e75d7] text-white rounded-xl shadow-lg shadow-blue-600/20 active:scale-90 transition-all"><Icons.Download /></button>
              </div>
            </div>
          );
        }

        return (
          <div className="bg-white dark:bg-[#161b22] rounded-[2rem] overflow-hidden shadow-sm border border-gray-100 dark:border-gray-800 group hover:shadow-2xl hover:-translate-y-1 transition-all relative fade-in">
            <div className="aspect-square bg-gray-100 dark:bg-[#0d1117] flex items-center justify-center relative overflow-hidden">
              {isImg ? (
                <img src={url} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" loading="lazy" />
              ) : isVid ? (
                <VideoThumbnail />
              ) : (
                <div className="text-gray-400 opacity-20"><Icons.FileText /></div>
              )}
              
              <button onClick={handleShare} disabled={isSharing} className="absolute top-3 right-[3.25rem] p-2 bg-black/40 text-white rounded-full hover:bg-[#0e75d7] disabled:opacity-50 transition-all z-20 flex items-center justify-center">
                 {isSharing ? <div className="w-[16px] h-[16px] rounded-full border-2 border-white border-t-transparent animate-spin"></div> : <Icons.Share />}
              </button>
              
              <button onClick={() => setShowDetail(true)} className="absolute top-3 right-3 p-2 bg-black/40 text-white rounded-full hover:bg-[#0e75d7] transition-all z-20"><Icons.Info /></button>
              
              <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-3 backdrop-blur-[2px] z-10">
                <button onClick={() => window.open(url, '_blank')} className="p-3 bg-white text-black rounded-full hover:bg-[#0e75d7] transition-all transform hover:scale-110 shadow-lg"><Icons.Eye /></button>
                <button onClick={() => downloadFile(file.ObjectName, (file.fullPath || '').split('/').slice(0,-1).join('/'), user.token)} className="p-3 bg-white text-black rounded-full hover:bg-[#0e75d7] transition-all transform hover:scale-110 shadow-lg"><Icons.Download /></button>
              </div>
            </div>
            <div className="p-3 text-center">
              <p className="text-[10px] font-black truncate dark:text-gray-300 uppercase tracking-tighter" title={file.ObjectName}>{file.ObjectName}</p>
              <button onClick={() => downloadFile(file.ObjectName, (file.fullPath || '').split('/').slice(0,-1).join('/'), user.token)} className="mt-2 w-full flex items-center justify-center gap-2 py-2 bg-blue-50 dark:bg-blue-900/20 text-[#0e75d7] rounded-xl text-[9px] font-black uppercase transition-all active:scale-95 shadow-sm">
                 <Icons.Download /> <span>Baixar</span>
              </button>
            </div>
            {showDetail && (
              <div className="absolute inset-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md p-6 flex flex-col justify-center animate-in zoom-in duration-200 z-30">
                 <button onClick={() => setShowDetail(false)} className="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition-all font-black uppercase text-xs">✕ Fechar</button>
                 <h3 className="text-[10px] font-black uppercase text-[#0e75d7] mb-3 tracking-widest border-b border-gray-200 dark:border-gray-700 pb-1 text-center">Informações</h3>
                 <div className="text-[11px] font-bold text-gray-500 dark:text-gray-300 space-y-2 uppercase tracking-tighter">
                    <p>Ficheiro: <span className="text-black dark:text-white break-all text-xs">{file.ObjectName}</span></p>
                    <p>Tamanho: <span className="text-black dark:text-white">{sizeMb} MB</span></p>
                    <p>Data: <span className="text-black dark:text-white">{date}</span></p>
                    {isVid && <p>Formato: <span className="text-black dark:text-white">{isVideosML ? 'Vertical (M. Livre)' : 'Horizontal (YouTube)'}</span></p>}
                 </div>
              </div>
            )}
          </div>
        );
      }

      // --- TAB CARNÊS ---
      function CarnesTab({ user }) {
        const [path, setPath] = useState(globalState.carnes.path);
        const [items, setItems] = useState(globalState.carnes.items);
        const [loading, setLoading] = useState(false);
        const [filter, setFilter] = useState(globalState.carnes.filter);

        useEffect(() => {
          globalState.carnes = { path, items, filter };
        }, [path, items, filter]);

        const loadFolder = async (p) => {
          setLoading(true);
          try {
            const data = await fetchWithCache(`${API_BASE}/list?path=${encodeURIComponent(p)}`, user.token);
            setItems(Array.isArray(data) ? data : []);
            setPath(p);
          } catch (e) { console.error("Pasta erro"); }
          setLoading(false);
        };

        useEffect(() => { 
          if(user && items.length === 0) loadFolder(path); 
        }, [user]);

        const filtered = items.filter(it => (it.ObjectName || '').toLowerCase().includes(filter.toLowerCase()));

        return (
          <div className="space-y-4 fade-in">
            <div className="flex items-center gap-2 overflow-x-auto pb-4 scrollbar-hide no-select">
              <div className="bg-white dark:bg-[#161b22] px-4 py-2 rounded-2xl border border-gray-100 dark:border-gray-800 flex items-center gap-2 whitespace-nowrap shadow-sm transition-colors">
                <Icons.Folder />
                {path.split('/').map((p, i, arr) => (
                  <Fragment key={i}>
                    <button onClick={() => loadFolder(arr.slice(0, i+1).join('/'))} className="text-[10px] font-black uppercase hover:text-[#0e75d7] transition-all tracking-widest">{p}</button>
                    {i < arr.length - 1 && <div className="opacity-30 text-[#0e75d7]"><Icons.ChevronRight /></div>}
                  </Fragment>
                ))}
              </div>
            </div>

            <div className="bg-white dark:bg-[#161b22] rounded-[2.5rem] border border-gray-100 dark:border-gray-800 shadow-2xl overflow-hidden transition-all">
              <div className="p-6 border-b border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/20 flex flex-col sm:flex-row gap-4 justify-between items-center transition-colors">
                 <div className="relative w-full sm:max-w-xs text-[#0e75d7]">
                   <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-50"><Icons.Search /></div>
                   <input className="w-full pl-12 pr-4 py-3 rounded-2xl bg-white dark:bg-[#0d1117] dark:text-white text-sm outline-none border-none shadow-inner transition-colors" placeholder="Procurar nesta pasta..." value={filter} onChange={e => setFilter(e.target.value)} />
                 </div>
                 <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest">{filtered.length} ficheiros encontrados</span>
              </div>
              {loading ? <div className="p-32 text-center text-gray-400 font-black animate-pulse uppercase tracking-widest">CARREGANDO...</div> : (
                <div className="divide-y border-gray-100 dark:divide-gray-800 max-h-[600px] overflow-y-auto custom-scroll transition-colors">
                  {filtered.length === 0 && <div className="p-20 text-center text-gray-400 uppercase text-xs font-bold tracking-widest">A pasta está vazia.</div>}
                  {filtered.map((it, i) => (
                    <div key={i} className="p-5 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-800/50 cursor-pointer group transition-all" onClick={() => it.IsDirectory && loadFolder(`${path}/${it.ObjectName}`)}>
                      <div className="flex items-center gap-4">
                        <div className={`p-4 rounded-2xl transition-all ${it.IsDirectory ? 'bg-blue-50 dark:bg-blue-900/20 shadow-sm group-hover:scale-105' : 'bg-gray-100 dark:bg-gray-800 text-gray-500'}`}>
                          {it.IsDirectory ? <Icons.Folder /> : <Icons.FileText />}
                        </div>
                        <div>
                          <p className="font-extrabold text-sm uppercase dark:text-gray-200 group-hover:text-[#0e75d7] transition-all tracking-tighter">{it.ObjectName}</p>
                          {!it.IsDirectory && <p className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Documento • {(it.Length / 1024).toFixed(0)} KB</p>}
                        </div>
                      </div>
                      {!it.IsDirectory && (
                        <div className="flex gap-2">
                          <button onClick={(e) => { e.stopPropagation(); window.open(`${PUBLIC_CDN}/${path}/${it.ObjectName}`, '_blank'); }} className="p-3 bg-gray-50 dark:bg-gray-800 text-gray-400 hover:text-[#0e75d7] transition-all"><Icons.Eye /></button>
                          <button onClick={(e) => { e.stopPropagation(); downloadFile(it.ObjectName, path, user.token); }} className="p-3 bg-blue-50 dark:bg-blue-900/20 text-[#0e75d7] rounded-xl hover:bg-[#0e75d7] hover:text-white transition-all shadow-sm"><Icons.Download /></button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      }

      // --- TAB UPLOAD ---
      function UploadTab({ user }) {
        const [files, setFiles] = useState([]);
        const [target, setTarget] = useState('Fprodutos');
        const [progress, setProgress] = useState({}); 
        const [uploading, setUploading] = useState(false);

        const startUpload = async () => {
          if (!files.length) return;
          setUploading(true);
          let uploadedAny = false;
          
          for (let i = 0; i < files.length; i++) {
            if (progress[i] === 'done') continue;
            setProgress(prev => ({ ...prev, [i]: 'loading' }));
            const form = new FormData();
            form.append('file', files[i]);
            form.append('path', `${target}/${files[i].name}`);
            try {
              const res = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${user.token}` },
                body: form
              });
              if (res.ok) uploadedAny = true;
              setProgress(prev => ({ ...prev, [i]: res.ok ? 'done' : 'error' }));
            } catch (e) { setProgress(prev => ({ ...prev, [i]: 'error' })); }
            await new Promise(r => setTimeout(r, 400));
          }
          
          if (uploadedAny) {
            clearApiCache(); // Limpa o cache para os novos arquivos aparecerem na busca imediatamente
          }
          setUploading(false);
        };

        return (
          <div className="max-w-2xl mx-auto space-y-6 fade-in">
            <div className="bg-white dark:bg-[#161b22] p-8 sm:p-12 rounded-[3rem] shadow-2xl border border-gray-100 dark:border-gray-800 transition-all">
              <div className="flex items-center gap-5 mb-10 border-b border-gray-100 dark:border-gray-800 pb-6 text-[#0e75d7]">
                <div className="p-5 bg-blue-50 dark:bg-blue-900/20 rounded-[1.5rem] shadow-lg transition-colors"><Icons.Upload /></div>
                <div>
                   <h2 className="text-2xl font-black uppercase tracking-tighter dark:text-white text-gray-900">Central de Envio</h2>
                   <p className="text-gray-400 text-[10px] font-black uppercase tracking-widest">Multi-upload Ativo</p>
                </div>
              </div>

              <div className="space-y-6">
                <div className="space-y-2">
                  <label className="text-[10px] font-black uppercase text-gray-400 ml-1 tracking-widest block uppercase">Pasta de Destino</label>
                  <select className="w-full p-5 rounded-2xl bg-gray-100 dark:bg-[#0d1117] dark:text-white border-none outline-none font-bold text-sm focus:ring-2 focus:ring-[#0e75d7] transition-all cursor-pointer shadow-inner" value={target} onChange={e => setTarget(e.target.value)}>
                    <option value="Fprodutos">Fotos de Produtos</option>
                    <option value="VideosProdutos/Videos YT">Vídeos Youtube</option>
                    <option value="VideosProdutos/Videos ML">Vídeos Mercado Livre</option>
                  </select>
                </div>

                <div className="border-4 border-dashed border-gray-100 dark:border-gray-800 p-12 rounded-[2.5rem] text-center hover:border-[#0e75d7] transition-all cursor-pointer relative group bg-gray-50/50 dark:bg-[#0d1117] text-[#0e75d7]">
                  <input type="file" multiple className="absolute inset-0 opacity-0 cursor-pointer" onChange={e => { setFiles(Array.from(e.target.files)); setProgress({}); }} />
                  {files.length > 0 ? (
                    <div className="flex flex-col items-center animate-in zoom-in text-[#0e75d7] font-black transition-colors">
                      <div className="mb-2"><Icons.Grid /></div>
                      <p className="text-sm uppercase tracking-tighter">{files.length} Ficheiro(s) Selecionados</p>
                      <p className="text-[9px] text-gray-400 font-bold mt-2 uppercase">Clique para trocar</p>
                    </div>
                  ) : (
                    <div className="opacity-30 group-hover:opacity-100 transition-all transform group-hover:scale-105">
                      <div className="mx-auto mb-4 flex justify-center"><Icons.Grid /></div>
                      <p className="font-black text-xs uppercase tracking-widest uppercase">Arraste múltiplos arquivos aqui</p>
                    </div>
                  )}
                </div>

                {files.length > 0 && (
                  <div className="space-y-3 bg-gray-50 dark:bg-[#0d1117] p-6 rounded-[2rem] max-h-[300px] overflow-y-auto custom-scroll shadow-inner border border-gray-100 dark:border-gray-800 transition-all">
                    {uploading && <div className="text-orange-500 font-black text-[10px] uppercase mb-4 animate-pulse">Não saia desta página até o fim!</div>}
                    {files.map((f, i) => (
                      <div key={i} className="space-y-1">
                        <div className="flex justify-between text-[9px] font-black uppercase tracking-widest transition-colors">
                          <span className="truncate max-w-[70%] dark:text-gray-300">{f.name}</span>
                          <span className={progress[i] === 'done' ? 'text-green-500 font-bold' : progress[i] === 'error' ? 'text-red-500' : 'text-[#0e75d7]'}>
                            {progress[i] === 'loading' ? 'ENVIANDO...' : progress[i] === 'done' ? 'CONCLUÍDO' : progress[i] === 'error' ? 'ERRO' : 'PENDENTE'}
                          </span>
                        </div>
                        <div className="h-1.5 w-full bg-gray-200 dark:bg-gray-800 rounded-full overflow-hidden shadow-inner transition-colors">
                          <div className={`h-full transition-all duration-700 ${progress[i] === 'done' ? 'bg-green-500' : progress[i] === 'error' ? 'bg-red-500' : progress[i] === 'loading' ? 'bg-[#0e75d7]' : 'bg-transparent'}`} style={{ width: progress[i] === 'done' ? '100%' : progress[i] === 'loading' ? '70%' : '0%' }} />
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                <button disabled={!files.length || uploading} onClick={startUpload} className="w-full bg-[#0e75d7] hover:bg-[#0c64b8] text-white font-black py-5 rounded-3xl transition shadow-xl shadow-blue-600/10 disabled:opacity-20 active:scale-95 uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                   <span>{uploading ? 'PROCESSANDO...' : 'INICIAR UPLOAD'}</span>
                </button>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }
  </script>
</body>
</html>
